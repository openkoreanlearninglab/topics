            for (let i = 0; i <= delays.length; i++) {

                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); 
                    if (!response.ok) { 
                        if (response.status === 429 || response.status >= 500) throw new Error(`Server error: ${response.status}`); 
                        throw new Error(`API error: ${response.statusText}`); 
                    } 
                    return await response.json(); 
                } catch (error) {

                        setVideoState(prev => ({ ...prev, currentTime: time })); 
                        const currentLine = VIDEO_SCRIPT_DATA.find(line => time >= line.time[0] && time < line.time[1]); 
                        if (currentLine) setActiveLine(currentLine.id); 
                    }
                }, 200); 
            };
            
            const stopInterval = () => { if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; } };

            useEffect(() => { 
                if (popup.show) return; 
                if (activeLine && autoScroll && scriptRefs.current[activeLine]) scriptRefs.current[activeLine].scrollIntoView({ behavior: 'smooth', block: 'center' }); 
            }, [activeLine, autoScroll, popup.show, layoutMode]);

            const handleLineClick = (time) => { const player = videoState.player; if (player) { player.seekTo(time, true); player.playVideo(); } };
            const toggleTranslation = (id) => setTranslations(prev => ({...prev, [id]: !prev[id]}));
            const scrollToVocab = (term) => { const element = sidebarVocabRefs.current[term]; if (element) element.scrollIntoView({ behavior: 'smooth', block: 'center' }); };
            
            const handleVocabEnter = (e, wordData) => { if (popup.fixed) return; const rect = e.target.getBoundingClientRect(); setPopup({ show: true, fixed: false, data: wordData, x: rect.left + rect.width / 2, y: rect.bottom }); if (showVocab) { setActiveVocabTerm(wordData.term); scrollToVocab(wordData.term); } };
            const handleVocabLeave = () => { if (popup.fixed) return; setPopup(prev => ({ ...prev, show: false })); };
            const handleVocabClick = (e, wordData) => { e.stopPropagation(); if (popup.fixed && popup.data && popup.data.term === wordData.term) { setPopup(prev => ({ ...prev, show: false, fixed: false })); return; } const rect = e.target.getBoundingClientRect(); setPopup({ show: true, fixed: true, data: wordData, x: rect.left + rect.width / 2, y: rect.bottom }); if (showVocab) { setActiveVocabTerm(wordData.term); scrollToVocab(wordData.term); } };

            const handleSeek = (e) => { const time = parseFloat(e.target.value); if (videoState.player) videoState.player.seekTo(time, true); setVideoState(prev => ({ ...prev, currentTime: time })); };
            const togglePlay = () => { const player = videoState.player; if (player) { if (videoState.isPlaying) player.pauseVideo(); else player.playVideo(); } };
            const rewind2 = () => { const player = videoState.player; if (player) { const newTime = Math.max(0, videoState.currentTime - 1.5); player.seekTo(newTime, true); setVideoState(prev => ({ ...prev, currentTime: newTime })); } };
            const forward2 = () => { const player = videoState.player; if (player) { const newTime = Math.min(videoState.duration, videoState.currentTime + 1.5); player.seekTo(newTime, true); setVideoState(prev => ({ ...prev, currentTime: newTime })); } };
            const formatTime = (seconds) => { if (isNaN(seconds)) return "00:00"; const date = new Date(seconds * 1000); const mm = date.getUTCMinutes(); const ss = date.getUTCSeconds(); return `${mm.toString().padStart(2, '0')}:${ss.toString().padStart(2, '0')}`; };

            const allVocabTerms = useMemo(() => { return VOCAB_DATA.flatMap(vocab => { const terms = [vocab.term]; if (vocab.variants) terms.push(...vocab.variants); if (vocab.subDefs) terms.push(...vocab.subDefs.map(s => s.subTerm)); return [...new Set(terms)].filter(t => t).map(term => ({ term, vocab })); }).sort((a, b) => b.term.length - a.term.length); }, []);

            const renderTextWithVocab = (text) => {
                if (!text) return [""];
                const matches = [];
                allVocabTerms.forEach(({ term, vocab }) => { let index = 0; while ((index = text.indexOf(term, index)) !== -1) { const end = index + term.length; const overlaps = matches.some(m => (index >= m.start && index < m.end) || (end > m.start && end <= m.end) || (index <= m.start && end >= m.end)); if (!overlaps) matches.push({ start: index, end, term, vocab }); index += 1; } });
                matches.sort((a, b) => a.start - b.start);
                const result = []; let lastIndex = 0;
                matches.forEach((match, idx) => { if (match.start > lastIndex) result.push(text.substring(lastIndex, match.start)); const isActive = (popup.show && popup.data && popup.data.term === match.vocab.term) || (showVocab && activeVocabTerm === match.vocab.term); 
                result.push(<span key={`${match.term}-${idx}`} className={`cursor-pointer border-b border-dotted transition-all duration-200 font-medium inline-block leading-tight ${isActive ? 'border-black bg-white text-black border-solid' : 'border-gray-400 text-gray-800 hover:border-black hover:text-black'}`} onMouseEnter={(e) => handleVocabEnter(e, match.vocab)} onMouseLeave={handleVocabLeave} onClick={(e) => handleVocabClick(e, match.vocab)}>{match.term}</span>); lastIndex = match.end; });
                if (lastIndex < text.length) result.push(text.substring(lastIndex));
                return result;
            };

            const isScriptMode = layoutMode === 'script';
            const isVideoOnlyMode = layoutMode === 'video';
            const isSplitMode = layoutMode === 'split';

            const videoStyle = isSplitMode ? `w-full aspect-video shrink-0 z-20 shadow-md lg:shadow-none lg:h-full lg:aspect-auto ${showVocab ? 'lg:w-[58%] xl:flex-1' : 'lg:w-[58%] xl:w-7/12'}` : (isScriptMode ? 'hidden' : 'flex-1 w-full h-full');
            const scriptContainerBaseClass = `flex-1 flex flex-col min-h-0 bg-white border-l border-gray-200 transition-all duration-300`;
            const scriptContainerResponsiveClass = isSplitMode ? `w-full lg:w-[42%] lg:h-full lg:flex-none ${showVocab ? 'xl:w-4/12' : 'xl:w-5/12'}` : (isScriptMode ? 'w-full h-full' : 'hidden');

            const LearnToolbar = () => (
                <div className="sticky top-0 z-40 h-16 flex items-center justify-between px-6 py-3 bg-white border-b border-gray-200 shadow-sm pr-14 print:hidden">
                    <div className="flex items-center gap-1 shrink-0">
                        {[
                            { id: 'split', kor: '동영상 & 스크립트', eng: 'Video & Transcript' }, 
                            { id: 'video', kor: '동영상만 보기', eng: 'Watch Video' }, 
                            { id: 'script', kor: '스크립트만 보기', eng: 'Read Transcript' }
                        ].map((mode) => {
                            const isActive = layoutMode === mode.id;
                            let visibilityClass = "hidden"; 
                            if (mode.id === 'split') visibilityClass = "flex"; 
                            else if (mode.id === 'video') visibilityClass = "hidden md:flex"; 
                            else if (mode.id === 'script') visibilityClass = "hidden sm:flex"; 
                            return (
                                <button key={mode.id} onClick={() => setLayoutMode(mode.id)} className={`flex-col items-center justify-center px-3 py-1.5 transition-all rounded-sm ${visibilityClass} ${isActive ? 'bg-black text-white' : 'text-gray-400 hover:text-black hover:bg-gray-50'}`}>
                                    <span className="text-[11px] md:text-xs font-bold font-sans">{mode.kor}</span>
                                    <span className="text-[8px] md:text-[9px] font-eng-header uppercase tracking-widest mt-0.5 opacity-80">{mode.eng}</span>
                                </button>
                            );
                        })}
                    </div>
                    <div className="flex items-center gap-4 flex-1 justify-end min-w-0">
                        <div className="hidden sm:flex items-center gap-4 flex-1 max-w-xl justify-end">
                            <div className="hidden md:flex flex-col flex-1 gap-1 w-full">
                                <div className="relative group h-2 flex items-center">
                                    <div className="absolute inset-0 flex items-center"><div className="w-full h-[1px] bg-gray-200 group-hover:h-[2px] transition-all"></div><div className="absolute left-0 top-1/2 -translate-y-1/2 h-[2px] bg-black" style={{ width: `${(videoState.currentTime/videoState.duration)*100}%` }}></div></div>
                                    <input type="range" min="0" max={videoState.duration || 100} value={videoState.currentTime} onChange={handleSeek} className="absolute inset-0 w-full opacity-0 cursor-pointer" />
                                </div>
                                <span className="text-[10px] font-mono text-gray-400 text-right leading-none">{formatTime(videoState.currentTime)} / {formatTime(videoState.duration)}</span>
                            </div>
                            <div className="hidden sm:flex items-center gap-3 shrink-0">
                                <button onClick={rewind2} className="text-gray-400 hover:text-black transition-colors"><RewindIcon className="w-4 h-4" /></button>
                                <button onClick={togglePlay} className="w-6 h-6 border border-black rounded-full flex items-center justify-center hover:bg-black hover:text-white transition-all">{videoState.isPlaying ? <PauseIcon className="w-2.5 h-2.5 fill-current" /> : <PlayIconSolid className="w-2.5 h-2.5 fill-current ml-0.5" />}</button>
                                <button onClick={forward2} className="text-gray-400 hover:text-black transition-colors"><ForwardIcon className="w-4 h-4" /></button>
                            </div>
                        </div>
                        <div className="h-4 w-px bg-gray-200 hidden sm:block"></div>
                        <div className="relative shrink-0 hidden sm:flex group">
                            <button onClick={() => setIsSpeedMenuOpen(!isSpeedMenuOpen)} className="flex items-center gap-1.5 text-xs font-bold font-ui uppercase tracking-wider text-gray-500 hover:text-black">{playbackRate.toFixed(1)}x</button>
                            {isSpeedMenuOpen && (
                                <>
                                <div className="fixed inset-0 z-40" onClick={() => setIsSpeedMenuOpen(false)}></div>
                                <div className="absolute top-full right-0 mt-2 bg-white border border-gray-200 shadow-xl p-1 z-50 w-20 animate-fade-in">
                                    {[0.5, 0.75, 1.0, 1.25, 1.5, 2.0].map(speed => (<button key={speed} onClick={() => { setPlaybackRate(speed); setIsSpeedMenuOpen(false); }} className={`w-full text-center py-1.5 text-[10px] font-bold font-ui hover:bg-white ${playbackRate === speed ? 'text-black' : 'text-gray-400'}`}>{speed}x</button>))}
                                </div>
                                </>
                            )}
                        </div>
                        <button onClick={() => setAutoScroll(!autoScroll)} className={`hidden sm:flex items-center gap-2 text-[10px] font-bold font-ui uppercase tracking-widest transition-colors ${autoScroll ? 'text-black' : 'text-gray-300 hover:text-gray-500'}`}>
                            <span className={`w-2 h-2 rounded-full ${autoScroll ? 'bg-black' : 'border border-gray-300'}`}></span>
                            <span className="md:hidden">Scroll</span><span className="hidden md:inline">Auto Scroll</span>
                        </button>
                        <button onClick={() => setShowVocab(!showVocab)} className={`hidden xl:flex items-center gap-2 px-3 py-1.5 border transition-all text-[10px] font-bold font-ui uppercase tracking-widest ${showVocab ? 'bg-black text-white border-black' : 'bg-white border-gray-200 text-gray-500 hover:border-black hover:text-black'}`}>Vocabulary</button>
                    </div>
                </div>
            );

            return (
                <div className="flex flex-col h-full animate-fade-in print:block print:h-auto print:overflow-visible">
                    <LearnToolbar />
                    <div className={`flex flex-col lg:flex-row flex-1 overflow-hidden relative print:flex-row print:overflow-visible print:h-auto print:block`}>
                        <VideoVocabPopup popup={popup} onGlobalClick={handleGlobalClick} />
                        <div className={`bg-black overflow-hidden relative transition-all duration-300 ${videoStyle} print:hidden`}>
                                {isLoading && (<div className="absolute inset-0 z-10 bg-black flex items-center justify-center"><div className="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div></div>)}
                                <div id="youtube-player" className={`w-full h-full`}></div>
                        </div>
                        <div className={`${scriptContainerBaseClass} ${scriptContainerResponsiveClass} ${isVideoOnlyMode ? 'hidden print:flex' : 'flex'} print:w-[80%] print:flex-none print:overflow-visible print:h-auto print:border-none print:pr-4`}>
                            <div className={`flex-1 overflow-y-auto bg-white print:overflow-visible print:h-auto print:block`}>
                                <div className={isScriptMode ? "w-full mx-auto p-4 sm:p-8 min-h-full bg-white shadow-sm my-8 max-w-4xl lg:max-w-5xl print:w-full print:max-w-none print:p-0 print:m-0 print:shadow-none" : "p-8 space-y-8 print:w-full print:max-w-none print:p-0 print:m-0 print:space-y-4"}>
                                    {VIDEO_SCRIPT_DATA.map(line => {
                                        const isActive = activeLine === line.id;
                                        const isLeft = line.speaker === VIDEO_SCRIPT_DATA[0].speaker;
                                        const translation = translations[line.id];
                                        const speakerClass = "text-xs sm:text-sm md:text-base lg:text-base xl:text-base font-bold font-ui uppercase tracking-widest text-gray-400 print:text-[10px] print:mb-0";
                                        const koreanClass = "text-base sm:text-lg md:text-xl lg:text-2xl xl:text-3xl font-serif leading-[1.8] tracking-wide text-left print:text-[12px] print:leading-snug";
                                        const englishClass = "text-xs sm:text-sm md:text-sm lg:text-sm xl:text-sm font-serif text-gray-500 text-left";

                                        if (isScriptMode) {
                                            return (
                                                <div key={line.id} ref={el => scriptRefs.current[line.id] = el} className={`flex flex-col w-full mb-8 ${isLeft ? 'items-start' : 'items-end'} print:mb-4 print:break-inside-avoid`}>
                                                    <span className={`${speakerClass} mb-2 ${isLeft ? 'ml-1' : 'mr-1'} print:mb-1`}>{line.speaker}</span>
                                                    <div onClick={() => handleLineClick(line.time[0])} className={`relative px-6 py-5 max-w-[90%] md:max-w-[80%] bg-white border border-transparent rounded-2xl ${isLeft ? 'rounded-bl-none' : 'rounded-br-none'} hover:shadow-md transition-all duration-300 cursor-pointer group ${isActive ? 'ring-1 ring-black border-black' : ''} print:p-2 print:rounded-md print:shadow-none print:border-gray-200 print:border print:max-w-none`}>
                                                        <p className={`${koreanClass} text-gray-800 print:text-black`}>{renderTextWithVocab(line.kor)}</p>
                                                        {translation && <div className="mt-3 pt-3 border-t border-dashed border-gray-100 animate-fade-in print:hidden"><p className={`${englishClass} leading-relaxed`}>{line.eng}</p></div>}
                                                        <div className={`flex items-center mt-4 gap-3 ${isLeft ? 'justify-start' : 'justify-end'} print:hidden`}>
                                                            <button onClick={(e) => { e.stopPropagation(); handleLineClick(line.time[0]); }} className="w-4 h-4 rounded-full border border-gray-300 flex items-center justify-center hover:bg-black hover:border-black hover:text-white transition-all text-gray-400 shrink-0"><PlayIconSolid className="w-2 h-2 ml-0.5" /></button>
                                                            <TranslateButton onClick={() => toggleTranslation(line.id)} isShowing={translation} labelOff="Eng" className="font-bold" />
                                                        </div>
                                                        <svg className={`absolute bottom-[-1px] ${isLeft ? '-left-[7px]' : '-right-[7px]'} w-[8px] h-[8px] z-10 print:hidden`} viewBox="0 0 8 8" fill="none"><path d={isLeft ? "M8 0 C 8 4 4 8 0 8 L 8 8 V 0 Z" : "M0 0 C 0 4 4 8 8 8 L 0 8 V 0 Z"} fill="white" /><path d={isLeft ? "M0 8 C 4 8 8 4 8 0" : "M8 8 C 4 8 0 4 0 0"} stroke={isActive ? "black" : "transparent"} strokeWidth="1" fill="none" /><path d={isLeft ? "M8 0 V8" : "M0 0 V8"} stroke="white" strokeWidth="2" /></svg>
                                                    </div>
                                                </div>
                                            );
                                        }

                                        return (
                                            <div key={line.id} ref={el => scriptRefs.current[line.id] = el} className={`transition-all duration-500 ${isActive ? 'opacity-100' : 'opacity-70 hover:opacity-90'} print:opacity-100 print:break-inside-avoid print:mb-4`}>
                                                <div className="flex items-center gap-2 mb-2 justify-start print:mb-0"><span className={speakerClass}>{line.speaker}</span><span className={`w-1.5 h-1.5 bg-black rounded-full animate-pulse ${isActive ? 'block' : 'hidden'} print:hidden`}></span></div>
                                                <div onClick={() => handleLineClick(line.time[0])} className="cursor-pointer group">
                                                    <p className={`${koreanClass} ${isActive ? 'text-black' : 'text-[#1a1a1a]'} print:text-black`}>{renderTextWithVocab(line.kor)}</p>
                                                    {translation && <p className={`${englishClass} mt-2 animate-fade-in pl-3 border-l border-gray-200 print:hidden`}>{line.eng}</p>}
                                                    <div className="flex items-center gap-3 mt-2 opacity-0 group-hover:opacity-100 transition-opacity justify-start print:hidden">
                                                        <button onClick={(e) => { e.stopPropagation(); handleLineClick(line.time[0]); }} className="w-4 h-4 rounded-full border border-gray-300 flex items-center justify-center hover:bg-black hover:border-black hover:text-white transition-all text-gray-400 shrink-0"><PlayIconSolid className="w-2 h-2 ml-0.5" /></button>
                                                        <TranslateButton onClick={() => toggleTranslation(line.id)} isShowing={translation} labelOff="Eng" />
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div className="h-32 print:hidden"></div>
                                </div>
                            </div>
                        </div>
                        <div className={`w-80 flex-col bg-white border-l border-gray-200 animate-fade-in ${showVocab ? 'flex' : 'hidden'} print:flex print:w-[20%] print:flex-none print:h-auto print:fixed-none print:static print:border-none print:overflow-visible ${isScriptMode ? 'fixed right-0 top-[114px] h-[calc(100vh-114px)]' : 'h-full'}`}>
                            <div className="p-5 border-b border-gray-100 flex items-center justify-between bg-white print:hidden"><span className="font-ui text-xs font-bold uppercase tracking-widest text-gray-900">핵심 어휘</span><span className="text-xs font-serif text-gray-500 italic">{VOCAB_DATA.length}개</span></div>
                            <div className="flex-1 overflow-y-auto bg-white print:overflow-visible print:h-auto">
                                {VOCAB_DATA.map((word, idx) => (<VideoSidebarVocabCard key={idx} word={word} activeVocabTerm={activeVocabTerm} sidebarVocabRefs={sidebarVocabRefs} />))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VocabExampleRow = ({ ex }) => {
            const [isTransVisible, setIsTransVisible] = useState(false);
            return (
                <div className="group print:hidden">
                    <div className="flex justify-between items-start gap-2">
                        <p className="font-serif-kr text-base text-gray-700 leading-relaxed mb-1.5 break-keep print:text-[11px]">{ex.kor}</p>
                        <div className={`shrink-0 mt-0.5 transition-opacity duration-200 ${isTransVisible ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} print:hidden`}><TranslateButton onClick={() => setIsTransVisible(!isTransVisible)} isShowing={isTransVisible} /></div>
                    </div>
                    {isTransVisible && (<p className="font-sans-kr text-sm text-gray-500 font-light leading-relaxed animate-fade-in print:text-[10px] print:block">{ex.eng}</p>)}
                </div>
            );
        };

        const VocabItem = ({ word }) => {
            const [showExamples, setShowExamples] = useState(false);
            return (
                <div className="bg-white p-8 md:p-12 border border-gray-200 hover:border-gray-300 transition-colors duration-300 flex flex-col h-full print:p-2 print:border-transparent print:break-inside-avoid">
                    <div className="mb-6 print:mb-2"><h3 className="font-serif-kr text-xl md:text-2xl text-gray-900 font-semibold tracking-tight mb-2 print:text-[14px] print:mb-1">{word.term}</h3><p className="font-sans-kr text-base text-gray-500 font-light print:text-[12px]">{word.mainDef}</p></div>
                    {word.subDefs && word.subDefs.length > 0 && (
                        <div className="mb-8 pl-4 border-l border-gray-200 flex-1 print:mb-2 print:pl-2">
                            <div className="font-sans-kr text-xs text-gray-400 tracking-widest uppercase mb-3 flex items-center gap-2 print:mb-1">어휘 풀이 <span className="font-eng-header font-light text-xs">BREAKDOWN</span></div>
                            <div className="space-y-4 print:space-y-1">
                                {word.subDefs.map((sub, idx) => (
                                    <div key={idx} className="flex flex-col gap-1 print:gap-0">
                                        <span className="font-serif-kr text-base text-gray-800 font-medium print:text-[13px]">{sub.subTerm}</span>
                                        <span className="font-sans-kr text-sm text-gray-500 leading-relaxed print:text-[11px]">{sub.subDef}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                    {(!word.subDefs || word.subDefs.length === 0) && <div className="flex-1 print:hidden"></div>}
                    {word.examples && word.examples.length > 0 && (
                        <div className="mt-6 pt-6 border-t border-gray-100 mt-auto print:mt-2 print:pt-2">
                            <button onClick={() => setShowExamples(!showExamples)} className="flex items-center gap-2 font-sans-kr text-xs text-gray-400 hover:text-gray-800 transition-colors duration-200 print:hidden">
                                <svg className={`w-3 h-3 transition-transform duration-200 ${showExamples ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>예문 보기 <span className="font-eng-header text-xs tracking-widest uppercase font-light">VIEW EXAMPLES</span>
                            </button>
                            {/* Force examples to show on print if needed, but per request examples are 11px and translations 10px. I'll just render them always in print mode */}
                            <div className={`space-y-5 bg-gray-50/50 p-5 rounded-sm mt-6 animate-fade-in print:block print:bg-transparent print:p-0 print:mt-0 print:space-y-2 ${showExamples ? 'block' : 'hidden'}`}>
                                {word.examples.map((ex, idx) => (
                                    <div key={idx} className="group print:block">
                                        <p className="font-serif-kr text-base text-gray-700 leading-relaxed mb-1.5 break-keep print:text-[11px] print:mb-0.5">{ex.kor}</p>

                                ))}

                    )}

            );
        };
        
        const VocabView = ({ updateProgress }) => { 
            useEffect(() => { updateProgress('vocab'); }, []); 
            return (
                <div className="w-full pt-16 px-6 max-w-[1000px] mx-auto pb-20 animate-fade-in print:pt-0 print:pb-0">
                    <div className="mb-12 md:mb-20 text-center animate-fade-in print:mb-6"><h2 className="font-serif-kr text-3xl md:text-4xl text-gray-900 font-semibold leading-tight print:text-[18px]">핵심 어휘</h2><span className="block font-eng-header text-[11px] md:text-xs tracking-[0.2em] text-gray-400 uppercase mt-2 print:text-[12px]">Key Vocabulary</span><div className="w-[1px] h-8 bg-gray-200 mx-auto mt-8 print:hidden"></div></div>

                </div>
            ); 
        };

        const QuizSentence = ({ quiz, onAttempt }) => {
            const [selectedOption, setSelectedOption] = useState(null);
            const [showHint, setShowHint] = useState(false);
            const [showTrans, setShowTrans] = useState(false);
            const [isSolved, setIsSolved] = useState(false);
            const [hasAttempted, setHasAttempted] = useState(false);

            const handleOptionClick = (option) => {
                if (isSolved && option.isCorrect) return;
                setSelectedOption(option);
                if (!hasAttempted) { setHasAttempted(true); onAttempt(quiz.id, option.isCorrect); }
                if (option.isCorrect) setIsSolved(true);
            };

            return (
                <div className="mb-16 pb-8 border-b border-gray-100 last:border-0 print:mb-6 print:pb-4 print:break-inside-avoid">
                    <div className="flex items-center gap-3 mb-4 print:mb-2"><span className="text-xs font-bold font-sans text-black border border-black px-1.5 py-0.5 print:text-[10px]">Q.{quiz.id}</span><div className="flex flex-col"><h3 className="text-lg font-bold font-serif text-gray-900 leading-snug print:text-[12px]">{quiz.questionKor}</h3><p className="text-xs font-sans text-gray-400 print:hidden">{quiz.questionEng}</p></div></div>
                    <div className="bg-gray-50 p-6 rounded-lg mb-6 border border-gray-200 print:p-2 print:mb-2 print:bg-transparent print:border-none">
                        <div className="text-xl font-serif text-gray-900 leading-loose text-left print:text-[12px] print:leading-normal"><span>{quiz.sentence_pre}</span><span className={`inline-block border-b-2 px-2 mx-1 font-bold transition-colors ${isSolved ? 'text-green-600 border-green-500' : (selectedOption && !selectedOption.isCorrect ? 'text-red-500 border-red-400' : 'text-gray-400 border-gray-400 min-w-[80px]')}`}>{isSolved ? quiz.correct_word : (selectedOption && !selectedOption.isCorrect ? selectedOption.text : '\u00A0\u00A0\u00A0\u00A0\u00A0\u00A0')}</span><span>{quiz.sentence_post}</span></div>
                        <div className={`mt-6 pt-6 border-t border-gray-200 text-left animate-fade-in print:mt-1 print:pt-1 print:border-none ${showTrans ? 'block' : 'hidden print:hidden'}`}>
                            <p className="text-sm font-serif text-gray-600 leading-relaxed print:text-[10px] print:leading-normal"><span>{quiz.translation_pre}</span><span className={`inline-block border-b-2 px-1 mx-1 font-bold transition-all ${isSolved ? 'text-green-700 border-green-500' : 'border-gray-400 min-w-[60px]'}`}>{isSolved ? quiz.translation_answer : '\u00A0\u00A0\u00A0\u00A0\u00A0'}</span><span>{quiz.translation_post}</span></p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6 print:grid-cols-2 print:gap-2 print:mb-2">
                        {quiz.options.map((option, idx) => (
                            <button key={idx} onClick={() => handleOptionClick(option)} disabled={isSolved && option.isCorrect} className={`p-4 text-left border rounded-lg transition-all font-serif text-base relative print:text-[12px] print:p-2 ${isSolved && option.isCorrect ? 'bg-green-50 border-green-500 text-green-800' : selectedOption === option ? (option.isCorrect ? 'bg-green-50 border-green-500 text-green-800' : 'bg-red-50 border-red-300 text-red-800') : 'bg-white border-gray-200 hover:border-gray-400 hover:shadow-sm text-gray-700'}`}>
                                <span className="font-bold mr-2 text-sm font-sans text-gray-400 print:text-[10px]">{String.fromCharCode(65 + idx)}.</span>{option.text}
                                {isSolved && option.isCorrect && <span className="absolute right-4 top-1/2 -translate-y-1/2 text-green-600">✓</span>}{selectedOption === option && !option.isCorrect && <span className="absolute right-4 top-1/2 -translate-y-1/2 text-red-500">✕</span>}
                            </button>
                        ))}
                    </div>
                    {selectedOption && (<div className={`p-4 rounded-lg text-sm mb-4 animate-fade-in print:text-[12px] print:p-2 print:mb-2 ${selectedOption.isCorrect ? 'bg-green-50 text-green-800 border border-green-100' : 'bg-red-50 text-red-800 border border-red-100'}`}><p className="font-bold mb-1 font-sans print:hidden">{selectedOption.isCorrect ? '정답입니다! 🎉' : '다시 생각해보세요.'}</p><p className="font-serif leading-relaxed">{selectedOption.feedback}</p></div>)}
                    <div className="flex items-center gap-4 text-xs font-bold font-sans print:hidden"><button onClick={() => setShowHint(!showHint)} className="text-gray-400 hover:text-journal-black uppercase tracking-widest transition-colors">Hint</button><div className="h-3 w-px bg-gray-300"></div><TranslateButton onClick={() => setShowTrans(!showTrans)} isShowing={showTrans} /></div>
                    <div className={`mt-3 text-sm font-sans text-gray-500 italic animate-fade-in print:text-[10px] print:mt-1 ${showHint ? 'block' : 'hidden print:hidden'}`}>💡 Hint: {quiz.hint}</div>
                </div>
            );
        };

        const QuizView = ({ updateProgress }) => {
            const [attempts, setAttempts] = useState({});
            const [quizData, setQuizData] = useState(() => { return QUIZ_LIST.map(quiz => ({ ...quiz, options: shuffleArray(quiz.options) })); });
            const [resetToken, setResetToken] = useState(0); 
            const totalQuestions = quizData.length; 
            const correctCount = Object.values(attempts).filter(v => v).length; 
            const currentScore = Math.round((correctCount / totalQuestions) * 100);
            
            useEffect(() => { const totalAttempts = Object.keys(attempts).length; if (totalAttempts === 0) return; updateProgress('quiz', currentScore); }, [attempts, currentScore, updateProgress]);
            const handleAttempt = (quizId, isCorrect) => { setAttempts(prev => ({ ...prev, [quizId]: isCorrect })); };
            const handleReset = () => { setAttempts({}); setQuizData(QUIZ_LIST.map(quiz => ({ ...quiz, options: shuffleArray(quiz.options) }))); setResetToken(prev => prev + 1); updateProgress('quiz', 0); };
            
            return (
                <div className="max-w-3xl mx-auto w-full px-6 py-12 animate-fade-in flex flex-col gap-8 print:pt-0 print:gap-4 print:block">
                    <div className="mb-12 md:mb-16 text-center animate-fade-in print:text-center print:mb-6"><h2 className="font-serif-kr text-3xl md:text-4xl text-gray-900 font-semibold leading-tight print:text-[18px]">내용 확인 퀴즈</h2><span className="block font-eng-header text-[11px] md:text-xs tracking-[0.2em] text-gray-400 uppercase mt-2 print:text-[12px]">Comprehension Quiz</span><div className="w-12 h-px bg-gray-200 mx-auto mt-12 md:mt-16 print:hidden"></div></div>
                    <div className="flex-1">{quizData.map((quiz) => (<QuizSentence key={`${quiz.id}-${resetToken}`} quiz={quiz} onAttempt={handleAttempt} />))}</div>
                    <div className="mt-8 pt-12 border-t border-gray-100 flex flex-col items-center gap-10 animate-fade-in print:hidden">
                        <div className="flex flex-col items-center"><span className="text-[10px] font-bold font-eng-header text-gray-400 uppercase tracking-[0.2em] mb-2">정답률 / Accuracy</span><span className="text-5xl font-serif-kr font-bold text-journal-black tracking-tight">{currentScore}%</span></div>
                        <button onClick={handleReset} className="group flex items-center gap-3 px-6 py-3 bg-white border border-gray-200 hover:border-black hover:bg-gray-50 transition-all duration-300"><svg className="w-4 h-4 text-gray-400 group-hover:text-black transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg><div className="flex flex-col items-start leading-none gap-1"><span className="text-xs font-bold font-sans-kr text-gray-900 group-hover:text-black">다시 풀기</span><span className="text-[9px] font-eng-header font-medium tracking-wider text-gray-400 group-hover:text-gray-600 uppercase">Retry</span></div></button>
                    </div>
                </div>
            );
        };

        const DiscussQuestionItem = ({ item, userLevel }) => {
            const [text, setText] = useState(''); 
            const [showTranslation, setShowTranslation] = useState(false);
            const [isGenerating, setIsGenerating] = useState(false);
            const [feedbackData, setFeedbackData] = useState(null);
            const [error, setError] = useState('');

            const handleGetFeedback = async () => {
                if (!text.trim()) return;
                setIsGenerating(true); setFeedbackData(null); setError('');

                const isBeginnerOrIntermediate = ["A1", "A1+", "A2", "A2+", "B1", "B1+"].includes(userLevel);
                let feedbackInstruction = isBeginnerOrIntermediate 
                    ? `The student's level is ${userLevel} (Beginner/Intermediate).\nFeedback Guidelines:\n1. feedback field: Write an encouraging and positive general feedback message **ENTIRELY IN ENGLISH**.\n2. correction field: Provide the fully corrected version of the student's answer in natural Korean.\n3. detailed_corrections field: Break down the specific errors. For each error:\n   - Provide the 'original' text (the incorrect Korean part).\n   - Provide the 'corrected' text (the correct Korean part).\n   - Provide an 'explanation' **ENTIRELY IN ENGLISH**. \n   - CRITICAL: Inside the English explanation, whenever you mention a Korean word or expression, you MUST wrap it in double asterisks like this: **한국어**.`
                    : `학생의 레벨은 ${userLevel} (중고급 이상)입니다.\n피드백 작성 지침:\n1. 모든 필드(feedback, correction, detailed_corrections)를 **오직 한국어로만** 자연스럽고 친절하게 작성해주세요. 영어는 절대 사용하지 마세요.\n2. detailed_corrections의 explanation 필드 내에서 강조하고 싶은 한국어 단어나 표현이 있다면 반드시 **단어** 처럼 마크다운 기호를 사용하여 강조해주세요.`;

                const vocabContext = item.vocab ? item.vocab.map(v => `- ${v.term}: ${v.def}`).join('\n') : "제공된 핵심 어휘 없음";
                const systemPrompt = `당신은 한국어 맞춤법과 문법에 완벽하게 통달한 전문적인 한국어 선생님입니다.\n${feedbackInstruction}\n\n[필수 준수 사항 - 철저한 오류 검증 및 환각 방지]\n1. 학생의 답변에서 철자(맞춤법), 띄어쓰기, 문법 오류를 가장 먼저 찾아내어 분석하세요. (예: '뒤담화'는 틀린 표기이며 '뒷담화'가 맞습니다.)\n2. 특히 아래 제공된 [핵심 어휘 목록]의 단어들이 정확한 맞춤법으로 사용되었는지 반드시 확인하세요.\n3. 'correction' 필에는 국립국어원 표준국어대사전 기준에 맞는 완벽한 한국어 문장만 작성하세요. 발음이 비슷하다고 해서 잘못된 철자를 맞는 것으로 간주해서는 안 됩니다.\n4. **[중요] 'correction' 필드의 모범 답안은 반드시 '해요체(~요)'를 사용하여 작성하세요.** (예: ~했습니다(X), ~한다(X) -> ~했어요(O))\n\n[출력 형식 (JSON)]\n반드시 아래 구조의 순수 JSON 포맷으로만 응답하세요. 마크다운 기호(\`\`\`json 등)는 절대 포함하지 마세요.\n{\n  "feedback": "...",\n  "correction": "...",\n  "detailed_corrections": [\n    { "original": "...", "corrected": "...", "explanation": "..." }\n  ]\n}\n\n[핵심 어휘 목록 (참고용)]\n${vocabContext}`;
                
                const combinedPrompt = `${systemPrompt}\n\n[학생의 요청]\n질문: "${item.questionKor}"\n학생 답변: "${text}"\n\n위 지침을 엄격히 준수하여 JSON 형식으로 피드백을 제공해주세요.`;

                const payload = { 
                    contents: [{ role: "user", parts: [{ text: combinedPrompt }] }], 
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                };

                try {
                    const result = await callGeminiWithBackoff(payload);
                    const feedbackText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (feedbackText) {
                        const cleanedText = feedbackText.replace(/^```(json)?\n?/, '').replace(/\n?```$/, '').trim();
                        setFeedbackData(JSON.parse(cleanedText));
                    } else {
                        setError("피드백을 생성하지 못했습니다.");
                    }
                } catch (err) { 
                    console.error("Feedback Generation API Error:", err);
                    setError("오류가 발생했습니다. 잠시 후 다시 시도해주세요."); 
                } finally { 
                    setIsGenerating(false); 
                }
            };

            return (
                <div className="mb-16 group print:mb-4 print:break-inside-avoid">
                    <div className="flex items-center gap-4 mb-6 print:mb-2"><span className="text-4xl font-serif font-bold text-gray-200 transition-colors duration-300 group-hover:text-gray-900 print:text-[14px] print:text-gray-900">0{item.id}</span><h3 className="text-xl font-serif font-bold text-gray-900 leading-normal print:text-[12px]">{item.questionKor}</h3></div>
                    <div className="pl-0 md:pl-14 print:pl-6">
                        <div className="flex gap-2 mb-4 print:hidden"><TranslateButton onClick={() => setShowTranslation(!showTranslation)} isShowing={showTranslation} />{showTranslation && (<p className="text-sm font-sans text-gray-500 animate-fade-in">{item.questionEng}</p>)}</div>
                        <div className="bg-gray-50 p-5 mb-6 border-l-2 border-black print:p-2 print:mb-2 print:bg-transparent print:border-l-0 print:border-t"><span className="text-xs font-bold font-sans text-gray-400 uppercase mb-2 block tracking-widest print:text-[10px]">Key Vocabulary</span><div className="space-y-1 print:space-y-0">{item.vocab.map((v, i) => (<p key={i} className="text-sm font-serif text-gray-700 print:text-[10px]"><span className="font-bold text-black mr-2">{v.term}</span>{v.def}</p>))}</div></div>
                        <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="여기에 생각을 적어보세요..." className="w-full p-4 border border-gray-300 font-serif text-base text-gray-900 focus:border-black focus:ring-0 outline-none min-h-[150px] bg-white resize-y mb-3 transition-colors placeholder:text-gray-300 print:hidden"></textarea>
                        <div className="flex justify-end print:hidden">
                            <button onClick={handleGetFeedback} disabled={!text.trim() || isGenerating} className={`px-6 py-2 text-xs font-bold font-sans uppercase tracking-widest border transition-colors flex items-center gap-2 ${!text.trim() || isGenerating ? 'border-gray-200 text-gray-300 cursor-not-allowed' : 'border-black bg-black text-white hover:bg-white hover:text-black'}`}>
                                {isGenerating ? (<><div className="w-3 h-3 border-2 border-current border-t-transparent rounded-full animate-spin"></div>Generating...</>) : 'Get AI Feedback'}
                            </button>
                        </div>
                        {error && (<div className="mt-4 p-4 text-sm text-red-600 bg-red-50 border border-red-100 rounded-sm animate-fade-in print:hidden">{error}</div>)}
                        {feedbackData && (
                            <div className="mt-8 p-6 bg-gray-50 border border-gray-200 rounded-sm animate-fade-in relative print:hidden">
                                <div className="flex items-center gap-2 mb-6 pb-4 border-b border-gray-200"><SparklesIcon className="w-5 h-5 text-gray-900" /><span className="text-xs font-bold font-sans text-gray-900 uppercase tracking-widest">AI Teacher Feedback</span></div>
                                <div className="space-y-8">
                                    <FeedbackSection titleKor="피드백" titleEng="FEEDBACK" content={renderFormattedText(feedbackData.feedback)} />
                                    <FeedbackSection titleKor="모범 답안" titleEng="CORRECTION" content={feedbackData.correction} isCorrection={true} />
                                    {feedbackData.detailed_corrections && feedbackData.detailed_corrections.length > 0 && (
                                        <div>
                                            <h4 className="text-[10px] font-bold font-sans text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2">상세 설명 <span className="font-eng-header font-medium text-[9px]">EXPLANATION</span></h4>
                                            <div className="space-y-3">
                                                {feedbackData.detailed_corrections.map((detail, idx) => (
                                                    <div key={idx} className="bg-white p-4 border border-gray-100 rounded-sm hover:border-gray-200 transition-colors">
                                                        {(detail.original || detail.corrected) && (
                                                            <div className="flex flex-wrap items-center gap-3 mb-2.5 text-[15px] font-serif">
                                                                {detail.original && <span className="text-red-400 line-through decoration-red-300/60">{detail.original}</span>}
                                                                {detail.original && detail.corrected && <span className="text-gray-300">→</span>}
                                                                {detail.corrected && <span className="text-gray-900 font-bold tracking-wide">{detail.corrected}</span>}
                                                            </div>
                                                        )}
                                                        <p className="text-[13px] md:text-sm font-sans text-gray-600 leading-relaxed">{renderFormattedText(detail.explanation)}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <div className="mt-8 pt-4 border-t border-gray-200"><p className="text-[10px] text-gray-400 font-sans text-center">※ AI가 생성한 피드백이므로 간혹 부자연스럽거나 오류가 있을 수 있습니다.</p></div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        const DiscussView = ({ updateProgress, userLevel }) => (
            <div className="max-w-3xl mx-auto w-full px-6 py-12 animate-fade-in print:pt-0">
                <div className="mb-12 md:mb-16 text-center animate-fade-in print:text-center print:mb-6">
                    <h2 className="font-serif-kr text-3xl md:text-4xl text-gray-900 font-semibold leading-tight print:text-[18px]">생각해 보기</h2><span className="block font-eng-header text-[11px] md:text-xs tracking-[0.2em] text-gray-400 uppercase mt-2 print:text-[12px]">Food For Thought</span>
                </div>
                <div className="bg-gray-50 border border-gray-200 py-4 px-5 mb-24 md:mb-32 rounded-none flex flex-col sm:flex-row sm:items-center justify-between gap-4 print:hidden">
                    <div className="flex gap-4 items-center">
                        <div className="shrink-0 text-gray-400"><SparklesIcon className="w-5 h-5" /></div>
                        <div className="flex flex-col"><p className="text-xs font-bold font-sans text-gray-800 leading-tight">AI 피드백은 현재 Gemini 웹에서만 가능합니다.</p><p className="text-[10px] font-sans text-gray-400 mt-1">AI feedback is currently available only on Gemini web.</p></div>
                    </div>
                    <a href="https://gemini.google.com" target="_blank" rel="noreferrer" className="group flex flex-col items-center justify-center bg-white py-1.5 px-3 shadow-sm hover:shadow transition-all shrink-0 no-underline rounded-none border border-gray-100">
                        <div className="flex items-center gap-1"><span className="text-[11px] font-bold font-sans text-gray-700 group-hover:text-black">Gemini에서 열기</span><ExternalLinkIcon className="w-3 h-3 text-gray-400 group-hover:text-black"/></div>
                        <span className="text-[9px] font-sans text-gray-400 group-hover:text-gray-600 uppercase tracking-widest mt-0.5">Open in Gemini</span>
                    </a>
                </div>
                <div className="print:grid print:grid-cols-2 print:gap-6 print:items-start print:w-full">
                    {DISCUSS_DATA.map((item) => (<DiscussQuestionItem key={item.id} item={item} userLevel={userLevel} />))}
                </div>
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('home'); 
            const [userLevel] = useState("A2+"); 
            const [progress, setProgress] = useState({ learn: false, vocab: false, quiz: 0, discuss: false });
            const [isHeaderExpanded, setIsHeaderExpanded] = useState(true);

            useEffect(() => { if (activeTab === 'video') { setIsHeaderExpanded(false); } else { setIsHeaderExpanded(true); } }, [activeTab]);
            const updateProgress = useCallback((key, value = true) => { setProgress(prev => { if (prev[key] === value) return prev; return { ...prev, [key]: value }; }); }, []);
            
            const renderContent = () => { 
                switch(activeTab) { 
                    case 'video': return <LearnView updateProgress={updateProgress} />; 
                    case 'vocab': return <VocabView updateProgress={updateProgress} />; 
                    case 'quiz': return <QuizView updateProgress={updateProgress} />; 
                    case 'discuss': return <DiscussView updateProgress={updateProgress} userLevel={userLevel} />; 
                    case 'home': default: return <HomeView setActiveTab={setActiveTab} userLevel={userLevel} />; 
                } 
            };
            
            const isVideoTab = activeTab === 'video';
            return (
                <div className={`flex flex-col bg-white text-gray-900 selection:bg-gray-200 selection:text-black font-sans ${isVideoTab ? 'h-screen overflow-hidden' : 'min-h-screen'} print:h-auto print:overflow-visible`}>
                    <Header isExpanded={isHeaderExpanded} setIsExpanded={setIsHeaderExpanded} activeTab={activeTab} setActiveTab={setActiveTab} />
                    <div className="lg:hidden h-14 border-b border-gray-100 flex items-center justify-center sticky top-0 bg-white z-40 print:hidden"><span className="text-lg font-bold font-sans tracking-tighter">OpenKoreanLearningLab</span></div>
                    <main className={`flex-1 relative flex flex-col ${isVideoTab ? 'overflow-x-hidden lg:overflow-hidden lg:h-full' : ''} print:overflow-visible print:h-auto print:block`}>{renderContent()}</main>
                    <nav className="lg:hidden fixed bottom-0 w-full bg-white border-t border-gray-100 flex justify-around p-3 z-50 print:hidden">{NAV_ITEMS.map((item) => (<button key={item.id} onClick={() => setActiveTab(item.id)} className={`p-2 ${activeTab === item.id ? 'text-black' : 'text-gray-300'}`}><item.icon className="w-6 h-6" /></button>))}</nav>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
