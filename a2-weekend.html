                { "term": "드디어", "mainDef": "finally; at last.", "variants": ["드디어"], "examples": [{ kor: '드디어 주말이에요!', eng: 'It is finally the weekend!' }] },

                { "term": "침대", "mainDef": "bed.", "variants": ["침대", "침대가", "침대에"], "examples": [{ kor: '침대가 최고예요!', eng: 'The bed is the best!' }] },
                { "term": "최고예요", "mainDef": "to be the best.", "subDefs": [{ "subTerm": "• 최고", "subDef": "the best; supreme." }, { "subTerm": "• -예요/이에요", "subDef": "polite copula 'to be'.\n(e.g.,침대가 최고예요 - The bed is the best.)" }], "variants": ["최고예요"], "examples": [{ kor: '쉬는 게 최고죠!', eng: 'Resting is the best!' }] },
                { "term": "집돌이", "mainDef": "homebody (male).", "subDefs": [{ "subTerm": "• -네요", "subDef": "expresses mild surprise or realization.\n(e.g., 집돌이네요 - Oh, you're a homebody!)" }], "variants": ["집돌이", "집돌이네요"], "examples": [{ kor: '민호 씨는 집돌이네요.', eng: 'You are a homebody, Minho.' }] },
                { "term": "눕다", "mainDef": "to lie down.", "subDefs": [{ "subTerm": "• 누워서", "subDef": "lying down (and then...); while lying down." }, { "subTerm": "• -아서/어서", "subDef": "links two related actions, indicating sequence or method.\n(e.g., 누워서 봐요 - I watch while lying down.)" }], "variants": ["눕다", "누워서", "누워"], "examples": [{ kor: '침대에 누워서 넷플릭스를 봐요.', eng: 'I lie in bed and watch Netflix.' }] },
                { "term": "하루 종일", "mainDef": "all day (long).", "subDefs": [{ "subTerm": "• 하루", "subDef": "one day." }, { "subTerm": "• 종일", "subDef": "all day; the whole day." }], "variants": ["하루 종일"], "examples": [{ kor: '하루 종일 볼 수 있어요.', eng: 'I can watch it all day.' }] },
                { "term": "볼 수 있어요", "mainDef": "can see; can watch.", "subDefs": [{ "subTerm": "• 보다", "subDef": "to see; to watch." }, { "subTerm": "• -ㄹ/을 수 있다", "subDef": "can; to be able to.\n(e.g., 볼 수 있어요 - I can watch.)" }], "variants": ["볼 수 있어요"], "examples": [{ kor: '하루 종일 볼 수 있어요.', eng: 'I can watch it all day long.' }] },

                { "term": "편하다", "mainDef": "to be comfortable.", "subDefs": [{ "subTerm": "• -고", "subDef": "connects verbs/adjectives ('and').\n(e.g., 편하고 좋아요 - It's comfortable and good.)" }, { "subTerm": "• -겠네요", "subDef": "expresses conjecture with realization.\n(e.g., 편하겠네요 - It must be comfortable.)" }], "variants": ["편하다", "편하고", "편하겠네요", "편해요", "편해"], "examples": [{ kor: '와, 정말 편하겠네요.', eng: 'Wow, that must be really comfortable.' }] },

                { "term": "친구하고", "mainDef": "with a friend.", "subDefs": [{ "subTerm": "• 친구", "subDef": "friend." }, { "subTerm": "• -하고", "subDef": "with; and (particle).\n(e.g., 친구하고 갔어요 - I went with a friend.)" }], "variants": ["친구하고"], "examples": [{ kor: '친구하고 팝업 스토어에 갔어요.', eng: 'I went to a pop-up store with a friend.' }] },
                { "term": "팝업 스토어", "mainDef": "pop-up store.", "variants": ["팝업 스토어", "팝업 스토어에", "팝업 스토어요"], "examples": [{ kor: '팝업 스토어에 갔어요.', eng: 'I went to a pop-up store.' }] },

            // --- Async Gemini Client with Backoff Strategy ---
            async function callGeminiWithBackoff(payload) {
                const apiKey = ""; 
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i <= delays.length; i++) {
                    try {
                        const response = await fetch(apiUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error(`API Connection Fault: ${response.statusText}`);
                        return await response.json();
                    } catch (error) {
                        if (i === delays.length) throw error;
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }

            // --- Vocabulary Dynamic Token Matching Highlight Parser ---
            function parseContentWithVocabMatches(text, themeColor) {
                const termsMap = VOCAB_DATA.flatMap((vocab) => {
                    const variants = [vocab.term];
                    if (vocab.variants) variants.push(...vocab.variants);
                    return variants.map(variant => ({ variant, vocab }));
                }).sort((a, b) => b.variant.length - a.variant.length);

                let segments = [{ text: text, isToken: false, vocab: null, display: null }];

                termsMap.forEach(({ variant, vocab }) => {
                    let nextSegments = [];
                    segments.forEach(seg => {
                        if (seg.isToken) {
                            nextSegments.push(seg);
                            return;
                        }
                        let index = 0;
                        let remainder = seg.text;
                        while ((index = remainder.indexOf(variant)) !== -1) {
                            if (index > 0) {
                                nextSegments.push({ text: remainder.substring(0, index), isToken: false, vocab: null, display: null });
                            }
                            nextSegments.push({ text: variant, isToken: true, vocab: vocab, display: variant });
                            remainder = remainder.substring(index + variant.length);
                        }
                        if (remainder.length > 0) {
                            nextSegments.push({ text: remainder, isToken: false, vocab: null, display: null });
                        }
                    });
                    segments = nextSegments;
                });

                return segments.map((seg) => {
                    if (!seg.isToken) return escapeHTML(seg.text);
                    const isHovered = (state.vocabPopup.show && state.vocabPopup.data && state.vocabPopup.data.term === seg.vocab.term) || (state.showVocab && state.activeVocabTerm === seg.vocab.term);
                    if (isHovered) {
                        return `<span data-vocab-term="${escapeHTML(seg.vocab.term)}" class="cursor-pointer border-b-2 transition-all duration-200 font-bold inline-block leading-tight text-${themeColor}-700 border-${themeColor}-500 bg-${themeColor}-100 rounded-sm px-0.5 mx-0.5">${escapeHTML(seg.display)}</span>`;
                    }
                    return `<span data-vocab-term="${escapeHTML(seg.vocab.term)}" class="cursor-pointer border-b-2 transition-all duration-200 font-bold inline-block leading-tight text-slate-900 border-dashed border-gray-400 hover:text-${themeColor}-600 hover:border-${themeColor}-400 hover:bg-${themeColor}-50">${escapeHTML(seg.display)}</span>`;
                }).join('');
            }

            // --- Native YouTube Iframe Handler Loop ---
            let requestFrameId = null;
            function startVideoProgressTracker() {
                stopVideoProgressTracker();
                function step() {
                    if (state.player && state.player.getCurrentTime) {
                        const time = state.player.getCurrentTime();
                        state.videoState.currentTime = time;
                        
                        // Sync Input Progress Range bar UI if present
                        const progressRange = document.getElementById('native-video-range');
                        if (progressRange) {
                            progressRange.value = time;
                            const timeIndicator = document.getElementById('native-time-indicator');
                            if (timeIndicator) {
                                timeIndicator.textContent = `${formatTimeMarkup(time)} / ${formatTimeMarkup(state.videoState.duration)}`;
                            }
                        }

                        const currentLine = SCRIPT_DATA.find(line => time >= line.time[0] && time < line.time[1]);
                        if (currentLine && state.activeLine !== currentLine.id) {
                            state.activeLine = currentLine.id;
                            highlightActiveTranscriptLine(currentLine.id);
                        }
                    }
                    requestFrameId = requestAnimationFrame(step);
                }
                requestFrameId = requestAnimationFrame(step);
            }

            function stopVideoProgressTracker() {
                if (requestFrameId) {
                    cancelAnimationFrame(requestFrameId);
                    requestFrameId = null;
                }
            }

            function highlightActiveTranscriptLine(lineId) {
                // Highly performant UI mutations for line highlight state without breaking video context
                document.querySelectorAll('.transcript-bubble-node').forEach(node => {
                    const id = node.getAttribute('data-line-id');
                    if (id === lineId) {
                        node.classList.remove('bg-white', 'border-slate-200', 'border-gray-200');
                        node.classList.add('bg-yellow-50', 'border-yellow-100', 'shadow-md', 'scale-[1.01]', 'lg:scale-[1.02]');
                        if (state.autoScroll && !state.vocabPopup.show) {
                            node.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    } else {
                        node.classList.remove('bg-yellow-50', 'border-yellow-100', 'shadow-md', 'scale-[1.01]', 'lg:scale-[1.02]');
                        node.classList.add('bg-white', 'border-gray-200');
                    }
                });

                document.querySelectorAll('.vocab-sidebar-node').forEach(node => {
                    const term = node.getAttribute('data-sidebar-term');
                    const activeVocab = SCRIPT_DATA.find(l => l.id === lineId);
                    if (activeVocab && state.showVocab) {
                        const isMatched = VOCAB_DATA.some(v => v.term === term && (activeVocab.kor.includes(v.term) || (v.variants && v.variants.some(varStr => activeVocab.kor.includes(varStr)))));
                        if (isMatched) {
                            const themeColor = getLevelTheme(state.userLevel);
                            node.className = `vocab-sidebar-node p-[1em] rounded-xl border transition-all duration-500 border-${themeColor}-500 bg-${themeColor}-50 ring-2 ring-${themeColor}-200 shadow-md scale-105`;
                            node.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        } else {
                            node.className = 'vocab-sidebar-node p-[1em] rounded-xl border transition-all duration-500 bg-white border-gray-200 shadow-sm';
                        }
                    }
                });
            }

            function initYouTubePlayerInstance() {
                if (state.player) return; // Prevent double initialization

                    let sidebarVocabMarkup = '';

                    mainContentHTML = `
                        <div class="flex gap-[1em] animate-fade-in relative w-full mx-auto ${containerClass}">

                            ${state.showVocab ? `

                }

                const menus = [
                    { id: 'home', label: '시작 페이지', subLabel: 'Home Page', icon: ICONS.home },
                    { id: 'learn', label: '동영상 자료', subLabel: 'Video Resources', icon: ICONS.learn(state.activeTab === 'learn') },
                    { id: 'vocab', label: '핵심 어휘', subLabel: 'Key Vocabulary', icon: ICONS.vocab },
                    { id: 'quiz', label: '내용 확인 퀴즈', subLabel: 'Comprehension Quiz', icon: ICONS.quiz },
                    { id: 'discuss', label: '생각해 보기', subLabel: 'Food For Thought', icon: ICONS.discuss }
                ];

                let sidebarMenusMarkup = menus.map(menu => {
                    const isActive = state.activeTab === menu.id;
                    const activeFontClass = isActive ? "font-cafe24-surround font-extrabold text-" + themeColor + "-600" : "font-cafe24 font-medium text-slate-700 group-hover:font-semibold group-hover:text-slate-900";
                    return `
                        <button data-action="navigate-tab" data-tab="${menu.id}" class="w-full flex items-center transition-all duration-200 group relative ${state.isSidebarCollapsed ? 'justify-center h-[3.5em] rounded-2xl' : 'gap-[0.75em] px-[0.75em] py-[1em] rounded-2xl'} ${isActive ? `bg-${themeColor}-50 text-${themeColor}-600` : 'text-slate-700 hover:bg-gray-50 hover:text-slate-900'}">
                            ${isActive ? `<div class="absolute left-0 top-1/2 -translate-y-1/2 bg-${themeColor}-500 rounded-r-lg ${state.isSidebarCollapsed ? 'w-[0.375em] h-[2em]' : 'w-[0.25em] h-[1.5em]'}"></div>` : ''}
                            <div class="shrink-0 transition-all duration-200 ${state.isSidebarCollapsed ? 'w-[2em] h-[2em]' : 'w-[1.75em] h-[1.75em]'} ${isActive ? `text-${themeColor}-600` : 'text-slate-400 group-hover:text-slate-900'}">${menu.icon}</div>
                            ${!state.isSidebarCollapsed ? `
                                <div class="flex flex-col items-start animate-fade-in overflow-hidden whitespace-nowrap">
                                    <span class="text-[0.875em] leading-tight transition-all ${activeFontClass}">${menu.label}</span>
                                    <span class="text-[0.625em] font-normal text-slate-400 mt-[0.125em] leading-tight">${menu.subLabel}</span>
                                </div>
                            ` : `
                                <div class="absolute left-full ml-[0.75em] px-[0.75em] py-[0.375em] bg-slate-900 text-white rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-50 shadow-xl flex flex-col items-start">
                                    <span class="text-[0.75em] font-bold">${menu.label}</span>
                                    <span class="text-[0.625em] opacity-80">${menu.subLabel}</span>
                                    <div class="absolute top-1/2 -left-[0.25em] -translate-y-1/2 w-[0.5em] h-[0.5em] bg-slate-900 rotate-45"></div>
                                </div>
                            `}
                        </button>
                    `;
                }).join('');

                const rootStructureTemplate = `
                    <aside style="font-size: ${sidebarFontSize}; width: ${sidebarWidth};" class="bg-white border-r border-gray-200 fixed h-full hidden lg:flex flex-col z-50 transition-all duration-300 ease-in-out font-basic">
                        <div class="p-[1.5em] flex items-center gap-[0.75em] relative ${state.isSidebarCollapsed ? 'justify-center px-0' : ''}">
                            <img src="https://raw.githubusercontent.com/openkoreanlearninglab/hub/refs/heads/main/OpenKoreanLearningLab_Logo.jpeg" alt="Logo" class="rounded-2xl shadow-lg shrink-0 transition-all duration-300 object-cover ${state.isSidebarCollapsed ? 'w-[3em] h-[3em]' : 'w-[3.75em] h-[3.75em]'}"/>
                            ${!state.isSidebarCollapsed ? `
                                <div class="animate-fade-in overflow-hidden whitespace-nowrap flex flex-col justify-center">
                                    <span class="font-extrabold text-[1.25em] text-black leading-tight font-cafe24-deco">Open</span>
                                    <span class="font-bold text-[0.68em] leading-tight font-mustache text-${getLevelTheme(state.userLevel)}-600">KoreanLearningLab</span>
                                </div>
                            ` : ''}
                            <button data-action="toggle-sidebar" class="absolute -right-[0.75em] top-1/2 -translate-y-1/2 bg-white border border-gray-200 rounded-full p-[0.25em] shadow-sm text-slate-500 hover:text-slate-700 hover:bg-gray-50 transition-colors z-10">
                                <div class="w-[0.75em] h-[0.75em]">${state.isSidebarCollapsed ? ICONS.chevronRight : ICONS.chevronLeft}</div>
                            </button>
                        </div>
                        <nav class="flex-1 space-y-[0.75em] mt-[1em] px-[0.75em]">${sidebarMenusMarkup}</nav>
                        <div class="p-[0.5em] border-t border-gray-100">
                            <div class="flex items-center gap-[0.75em] p-[0.5em] rounded-xl transition-colors hover:bg-gray-50 cursor-pointer ${state.isSidebarCollapsed ? 'justify-center' : ''} sidebar-learner-level-badge">
                                <div class="w-[2.75em] h-[2.75em] rounded-xl flex items-center justify-center shrink-0 transition-colors duration-300 ${currentStyle.split(' ')[0]} border ${currentStyle.split(' ')[2]}">
                                    <span class="text-[1em] font-extrabold font-school-smile ${currentStyle.split(' ')[1]}">${state.userLevel}</span>
                                </div>
                                ${!state.isSidebarCollapsed ? `
                                    <div class="animate-fade-in overflow-hidden whitespace-nowrap flex-1">
                                        <p class="text-[0.875em] font-bold text-slate-900 mb-[0.0625em] font-basic">학습자(Learner)</p>
                                        <div class="mt-[0.0625em]">
                                            <span class="block w-fit px-[0.125em] py-[0.125em] rounded text-[0.625em] font-semibold border uppercase tracking-wide shadow-sm text-left cursor-help font-basic ${currentStyle}">Level: ${LEVEL_DEFINITIONS[state.userLevel].title}</span>
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    </aside>

                    <div class="flex-1 flex flex-col transition-all duration-300 ease-in-out" style="margin-left: ${marginLeftWidth};">
                        <header class="bg-white transition-all duration-300 z-40 ${state.activeTab === 'learn' && state.layoutMode === 'script' ? 'sticky top-0' : 'relative lg:sticky lg:top-0'}" style="height: 4rem; font-size: ${headerFontSize};">
                            ${headerHTML}
                        </header>
                        <main class="flex-1 ${paddingClass} flex flex-col ${scrollClass}">
                            ${mainContentHTML}
                        </main>
                    </div>

                    <nav class="lg:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-[0.75rem] z-50">
                        ${['home','learn','vocab','quiz','discuss'].map(t => `
                            <button data-action="navigate-tab" data-tab="${t}" class="p-[0.5rem] rounded-lg ${state.activeTab === t ? `text-${themeColor}-600 bg-${themeColor}-50` : 'text-slate-400'}">
                                <div class="w-[1.5rem] h-[1.5rem]">
                                    ${t === 'home' ? ICONS.home : t === 'learn' ? ICONS.learn(state.activeTab === 'learn') : t === 'vocab' ? ICONS.vocab : t === 'quiz' ? ICONS.quiz : ICONS.discuss}
                                </div>
                            </button>
                        `).join('')}
                    </nav>

                    <div id="portal-tooltip-root">
                        ${state.levelTooltip.show ? `
                            <div class="fixed z-[9999] pointer-events-none animate-fade-in" style="left: ${state.levelTooltip.x}px; top: ${state.levelTooltip.y}px;">
                                <div class="relative bg-slate-900/95 backdrop-blur text-white text-[0.75em] rounded-xl p-[1em] shadow-2xl transform -translate-y-full -translate-x-[1.5em] -mt-[0.75em] w-[16em] border border-slate-700/50">
                                    <p class="font-bold mb-[0.375em] text-[0.875em] text-${themeColor}-300">${state.userLevel} – ${LEVEL_DEFINITIONS[state.userLevel].title}</p>
                                    <p class="opacity-90 leading-relaxed font-medium text-slate-200">${LEVEL_DEFINITIONS[state.userLevel].desc}</p>
                                    <div class="absolute -bottom-[0.375em] left-[1em] w-[0.75em] h-[0.75em] bg-slate-900/95 border-r border-b border-slate-700/50 rotate-45"></div>
                                </div>
                            </div>
                        ` : ''}

                        ${state.vocabPopup.show && state.vocabPopup.data ? (function() {
                            const POPUP_WIDTH = 288;
                            const SCREEN_PADDING = 16;
                            const screenW = window.innerWidth;
                            let leftPos = state.vocabPopup.x - (POPUP_WIDTH / 2);
                            if (leftPos < SCREEN_PADDING) leftPos = SCREEN_PADDING;
                            else if (leftPos + POPUP_WIDTH > screenW - SCREEN_PADDING) leftPos = screenW - POPUP_WIDTH - SCREEN_PADDING;
                            let arrowLeft = state.vocabPopup.x - leftPos;
                            if (arrowLeft < 12) arrowLeft = 12;
                            if (arrowLeft > POPUP_WIDTH - 12) arrowLeft = POPUP_WIDTH - 12;

                            return `
                                <div class="fixed z-[9999] bg-white rounded-xl shadow-xl border border-gray-200 p-[1em] w-[18em] animate-fade-in pointer-events-none" style="left: ${leftPos}px; top: ${state.vocabPopup.y + 12}px;">
                                    <div class="flex items-center justify-between mb-[0.5em]"><h3 class="text-[1.25em] font-black text-slate-900 font-ocarina">${escapeHTML(state.vocabPopup.data.term)}</h3></div>
                                    <p class="text-[1.1875em] text-slate-700 font-medium mb-[0.75em] leading-snug font-diary">${escapeHTML(state.vocabPopup.data.mainDef)}</p>
                                    ${state.vocabPopup.fixed && state.vocabPopup.data.subDefs && state.vocabPopup.data.subDefs.length > 0 ? `
                                        <div class="space-y-[0.25em] mt-[0.5em]">
                                            ${state.vocabPopup.data.subDefs.map(sub => `
                                                <div class="bg-${themeColor}-50 rounded-lg p-[0.5em] border border-${themeColor}-100">
                                                    <p class="text-[1.125em] text-${themeColor}-900 font-bold font-school-free">${escapeHTML(sub.subTerm)}</p>
                                                    <p class="text-[1.0625em] text-${themeColor}-700 font-dictation">${escapeHTML(sub.subDef)}</p>
                                                </div>
                                            `).join('')}
                                        </div>
                                    ` : ''}
                                    <div class="absolute top-0 -translate-x-1/2 -translate-y-1/2 w-[0.75em] h-[0.75em] bg-white border-l border-t border-gray-200 rotate-45" style="left: ${arrowLeft}px;"></div>
                                </div>
                            `;
                        })() : ''}
                    </div>
                `;

                rootContainer.innerHTML = rootStructureTemplate;

                // Sync video DOM context if tab is 'learn' and state holds a valid instance
                if (state.activeTab === 'learn') {
                    initYouTubePlayerInstance();
                } else {
                    stopVideoProgressTracker();
                    state.player = null; // Clean up node instance references safely
                }
            }

            // --- Micro-optimization Event Broker Delegation ---
            function bindEventDelegators() {
                const root = document.getElementById('app');

                // Universal input mapping tracker
                root.addEventListener('input', function(e) {
                    if (e.target && e.target.classList.contains('discuss-textarea-node')) {
                        const id = e.target.getAttribute('data-discuss-id');
                        state.discuss.answers[id] = e.target.value;
                        
                        // Dynamically look up and switch submit button capability locally
                        const btn = root.querySelector(`button[data-action="submit-ai-feedback"][data-id="${id}"]`);
                        if (btn) {
                            btn.disabled = !e.target.value.trim();
                        }
                    }

                    if (e.target && e.target.id === 'native-video-range') {
                        const targetTime = parseFloat(e.target.value);
                        if (state.player && state.player.seekTo) {
                            state.player.seekTo(targetTime, true);
                        }
                        state.videoState.currentTime = targetTime;
                        const timeIndicator = document.getElementById('native-time-indicator');
                        if (timeIndicator) {
                            timeIndicator.textContent = `${formatTimeMarkup(targetTime)} / ${formatTimeMarkup(state.videoState.duration)}`;
                        }
                    }
                });

                // Universal interaction click broker
                root.addEventListener('click', function(e) {
                    const actionTarget = e.target.closest('[data-action]');
                    
                    // Term highlight hover/click bypass mechanics
                    const vocabHighlightNode = e.target.closest('[data-vocab-term]');
                    if (vocabHighlightNode) {
                        const termStr = vocabHighlightNode.getAttribute('data-vocab-term');
                        const matchedVocabObj = VOCAB_DATA.find(v => v.term === termStr);
                        if (matchedVocabObj) {
                            const rect = vocabHighlightNode.getBoundingClientRect();
                            if (state.vocabPopup.fixed && state.vocabPopup.data && state.vocabPopup.data.term === termStr) {
                                state.vocabPopup.show = false;
                                state.vocabPopup.fixed = false;
                            } else {
                                state.vocabPopup = {
                                    show: true,
                                    fixed: true,
                                    data: matchedVocabObj,
                                    x: rect.left + rect.width / 2,
                                    y: rect.bottom + window.scrollY
                                };
                                if (state.showVocab) {
                                    state.activeVocabTerm = termStr;
                                }
                            }
                            render();
                            return;
                        }
                    }

                    // Level badge modal toggle triggers
                    const levelBadgeNode = e.target.closest('.sidebar-learner-level-badge');
                    if (levelBadgeNode) {
                        const rect = levelBadgeNode.getBoundingClientRect();
                        state.levelTooltip.show = !state.levelTooltip.show;
                        state.levelTooltip.x = rect.right;
                        state.levelTooltip.y = rect.top;
                        render();
                        return;
                    }

                    if (!actionTarget) {
                        // Dismiss popups on empty blanket clicks
                        if (state.vocabPopup.show && !e.target.closest('[data-vocab-term]')) {
                            state.vocabPopup.show = false;
                            state.vocabPopup.fixed = false;
                            render();
                        }
                        return;
                    }

                    const action = actionTarget.getAttribute('data-action');

                    switch (action) {
                        case 'navigate-tab':
                            const destinationTab = actionTarget.getAttribute('data-tab');
                            state.activeTab = destinationTab;
                            if (destinationTab === 'learn' && !state.isSidebarCollapsed) {
                                state.isSidebarCollapsed = true;
                            } else if (destinationTab !== 'learn' && state.isSidebarCollapsed && window.innerWidth >= 1024) {
                                state.isSidebarCollapsed = false;
                            }
                            if (destinationTab === 'quiz') {
                                prepareQuizQuestion();
                            }
                            render();
                            break;

                        case 'toggle-sidebar':
                            state.isSidebarCollapsed = !state.isSidebarCollapsed;
                            render();
                            break;

                        case 'set-layout-mode':
                            state.layoutMode = actionTarget.getAttribute('data-mode');
                            render();
                            break;

                        case 'video-play-toggle':
                            if (state.player && state.player.getPlayerState) {
                                if (state.videoState.isPlaying) {
                                    state.player.pauseVideo();
                                } else {
                                    state.player.playVideo();
                                }
                            }
                            break;

                        case 'video-rewind':
                            if (state.player && state.player.seekTo) {
                                state.player.seekTo(Math.max(0, state.videoState.currentTime - 1.5), true);
                            }
                            break;

                        case 'video-forward':
                            if (state.player && state.player.seekTo) {
                                state.player.seekTo(Math.min(state.videoState.duration, state.videoState.currentTime + 1.5), true);
                            }
                            break;

                        case 'toggle-speed-dropdown':
                            state.isSpeedMenuOpen = !state.isSpeedMenuOpen;
                            render();
                            break;

                        case 'close-speed-dropdown':
                            state.isSpeedMenuOpen = false;
                            render();
                            break;

                        case 'change-playback-speed':
                            const speedVal = parseFloat(actionTarget.getAttribute('data-speed'));
                            state.playbackRate = speedVal;
                            if (state.player && state.player.setPlaybackRate) {
                                state.player.setPlaybackRate(speedVal);
                            }
                            state.isSpeedMenuOpen = false;
                            render();
                            break;

                        case 'toggle-autoscroll-switch':
                            state.autoScroll = !state.autoScroll;
                            render();
                            break;

                        case 'toggle-vocabulary-panel':
                            state.showVocab = !state.showVocab;
                            render();
                            break;

                        case 'seek-transcript-time':
                            const timeVal = parseFloat(actionTarget.getAttribute('data-time'));
                            if (state.player && state.player.seekTo) {
                                state.player.seekTo(timeVal, true);
                                state.player.playVideo();
                            }
                            break;

                        case 'toggle-transcript-translation':
                            const lineId = actionTarget.getAttribute('data-id');
                            state.discuss.showTranslations[lineId] = !state.discuss.showTranslations[lineId];
                            render();
                            break;

                        case 'toggle-vocab-card-expand':
                            const cardIdx = actionTarget.getAttribute('data-idx');
                            const targetExpandArea = document.getElementById(`vocab-card-expand-area-${cardIdx}`);
                            if (targetExpandArea) {
                                if (targetExpandArea.classList.contains('max-h-0')) {
                                    targetExpandArea.classList.remove('max-h-0', 'opacity-0');
                                    targetExpandArea.classList.add('max-h-[24em]', 'opacity-100', 'mt-[0.5em]');
                                    actionTarget.querySelector('svg').classList.add('rotate-90');
                                } else {
                                    targetExpandArea.classList.add('max-h-0', 'opacity-0');
                                    targetExpandArea.classList.remove('max-h-[24em]', 'opacity-100', 'mt-[0.5em]');
                                    actionTarget.querySelector('svg').classList.remove('rotate-90');
                                }
                            }
                            break;

                        case 'quiz-select-option':
                            const optIdx = parseInt(actionTarget.getAttribute('data-opt-idx'));
                            const currentQ = QUIZ_LIST[state.quiz.currentQuestionIndex];
                            const matchedOpt = state.quiz.shuffledOptions[optIdx];
                            
                            if (state.quiz.firstAttempts[state.quiz.currentQuestionIndex] === undefined) {
                                state.quiz.firstAttempts[state.quiz.currentQuestionIndex] = matchedOpt.isCorrect;
                            }
                            state.quiz.answers[state.quiz.currentQuestionIndex] = matchedOpt;
                            state.quiz.showHint = false;
                            render();
                            break;

                        case 'quiz-toggle-hint':
                            state.quiz.showHint = !state.quiz.showHint;
                            render();
                            break;

                        case 'quiz-toggle-translation':
                            state.quiz.showTranslation = !state.quiz.showTranslation;
                            render();
                            break;

                        case 'quiz-prev-question':
                            if (state.quiz.currentQuestionIndex > 0) {
                                state.quiz.currentQuestionIndex--;
                                state.quiz.showHint = false;
                                state.quiz.showTranslation = false;
                                prepareQuizQuestion();
                                render();
                            }
                            break;

                        case 'quiz-next-question':
                            if (state.quiz.currentQuestionIndex < QUIZ_LIST.length - 1) {
                                state.quiz.currentQuestionIndex++;
                                state.quiz.showHint = false;
                                state.quiz.showTranslation = false;
                                prepareQuizQuestion();
                                render();
                            } else {
                                state.quiz.isFinished = true;
                                const totalQuestions = QUIZ_LIST.length;
                                const correctCount = Object.values(state.quiz.firstAttempts).filter(c => c === true).length;
                                const finalScore = Math.round((correctCount / totalQuestions) * 100);
                                state.progress.quiz = finalScore;
                                render();
                            }
                            break;

                        case 'quiz-retry':
                            state.quiz.currentQuestionIndex = 0;
                            state.quiz.answers = {};
                            state.quiz.firstAttempts = {};
                            state.quiz.showHint = false;
                            state.quiz.showTranslation = false;
                            state.quiz.isFinished = false;
                            state.progress.quiz = 0;
                            prepareQuizQuestion();
                            render();
                            break;

                        case 'discuss-toggle-translation':
                            const dId = actionTarget.getAttribute('data-id');
                            state.discuss.showTranslations[dId] = !state.discuss.showTranslations[dId];
                            render();
                            break;

                        case 'submit-ai-feedback':
                            const questionId = actionTarget.getAttribute('data-id');
                            const questionObj = DISCUSS_DATA.find(q => String(q.id) === String(questionId));
                            const userTextAnswer = state.discuss.answers[questionId] || '';
                            
                            executeAITutorFeedbackVerificationPipeline(questionId, questionObj.question, userTextAnswer);
                            break;
                    }
                });

                // Continuous pointer tracking for dynamic matching vocabulary lookup triggers
                root.addEventListener('mouseover', function(e) {
                    const node = e.target.closest('[data-vocab-term]');
                    if (node && !state.vocabPopup.fixed) {
                        const termStr = node.getAttribute('data-vocab-term');
                        const vocabObj = VOCAB_DATA.find(v => v.term === termStr);
                        if (vocabObj) {
                            const rect = node.getBoundingClientRect();
                            state.vocabPopup = {
                                show: true,
                                fixed: false,
                                data: vocabObj,
                                x: rect.left + rect.width / 2,
                                y: rect.bottom + window.scrollY
                            };
                            const rootTooltip = document.getElementById('portal-tooltip-root');
                            if (rootTooltip) {
                                const themeColor = getLevelTheme(state.userLevel);
                                const POPUP_WIDTH = 288;
                                const SCREEN_PADDING = 16;
                                const screenW = window.innerWidth;
                                let leftPos = state.vocabPopup.x - (POPUP_WIDTH / 2);
                                if (leftPos < SCREEN_PADDING) leftPos = SCREEN_PADDING;
                                else if (leftPos + POPUP_WIDTH > screenW - SCREEN_PADDING) leftPos = screenW - POPUP_WIDTH - SCREEN_PADDING;
                                let arrowLeft = state.vocabPopup.x - leftPos;
                                if (arrowLeft < 12) arrowLeft = 12;
                                if (arrowLeft > POPUP_WIDTH - 12) arrowLeft = POPUP_WIDTH - 12;

                                let subdefsMarkup = '';
                                if (vocabObj.subDefs && vocabObj.subDefs.length > 0) {
                                    subdefsMarkup = `<div class="space-y-[0.25em] mt-[0.5em]">${vocabObj.subDefs.map(sub => `
                                        <div class="bg-${themeColor}-50 rounded-lg p-[0.5em] border border-${themeColor}-100">
                                            <p class="text-[1.125em] text-${themeColor}-900 font-bold font-school-free">${escapeHTML(sub.subTerm)}</p>
                                            <p class="text-[1.0625em] text-${themeColor}-700 font-dictation">${escapeHTML(sub.subDef)}</p>
                                        </div>
                                    `).join('')}</div>`;
                                }

                                rootTooltip.innerHTML = `
                                    <div class="fixed z-[9999] bg-white rounded-xl shadow-xl border border-gray-200 p-[1em] w-[18em] animate-fade-in pointer-events-none" style="left: ${leftPos}px; top: ${state.vocabPopup.y + 12}px;">
                                        <div class="flex items-center justify-between mb-[0.5em]"><h3 class="text-[1.25em] font-black text-slate-900 font-ocarina">${escapeHTML(vocabObj.term)}</h3></div>
                                        <p class="text-[1.1875em] text-slate-700 font-medium mb-[0.75em] leading-snug font-diary">${escapeHTML(vocabObj.mainDef)}</p>
                                        ${subdefsMarkup}
                                        <div class="absolute top-0 -translate-x-1/2 -translate-y-1/2 w-[0.75em] h-[0.75em] bg-white border-l border-t border-gray-200 rotate-45" style="left: ${arrowLeft}px;"></div>
                                    </div>
                                `;
                            }
                        }
                    }
                });

                root.addEventListener('mouseout', function(e) {
                    const node = e.target.closest('[data-vocab-term]');
                    if (node && !state.vocabPopup.fixed) {
                        state.vocabPopup.show = false;
                        const rootTooltip = document.getElementById('portal-tooltip-root');
                        if (rootTooltip) rootTooltip.innerHTML = '';
                    }
                });
            }

            async function executeAITutorFeedbackVerificationPipeline(qId, questionText, userText) {
                state.aiFeedback[qId] = { isLoading: true, error: null, feedback: null };
                render();

                const systemPrompt = `You are an advanced Korean language tutor AI for A2 level learners. Analyze the response using polite "haeyo-che" (~요) ending format feedback strictly. Response structure must obey specified structural properties.`;
                const payload = {
                    contents: [{
                        role: "user",
                        parts: [
                            { text: systemPrompt },
                            { text: `Question: "${questionText}"\nUser's Answer: "${userText}"` }
                        ]
                    }],
                    generationConfig: {
                        responseMimeType: "application/json",
                        responseSchema: {
                            type: "OBJECT",
                            properties: {
                                "is_relevant": { "type": "BOOLEAN" },
                                "relevance_feedback_eng": { "type": "STRING", "nullable": true },
                                "is_correct": { "type": "BOOLEAN", "nullable": true },
                                "feedback_message_eng": { "type": "STRING", "nullable": true },
                                "corrected_sentence": { "type": "STRING", "nullable": true },
                                "explanation_eng": { "type": "STRING", "nullable": true }
                            },
                            required: ["is_relevant", "is_correct", "feedback_message_eng", "corrected_sentence", "explanation_eng"]
                        }
                    }
                };

                try {
                    const result = await callGeminiWithBackoff(payload);
                    if (result.candidates?.[0]?.content?.parts?.[0]?.text) {
                        const parsedFeedback = JSON.parse(result.candidates[0].content.parts[0].text);
                        state.aiFeedback[qId] = { isLoading: false, error: null, feedback: parsedFeedback };
                    } else {
                        state.aiFeedback[qId] = { isLoading: false, error: "AI의 응답을 처리하는 데 문제가 발생했어요.", feedback: null };
                    }
                } catch (err) {
                    state.aiFeedback[qId] = { isLoading: false, error: "문장 검사에 실패했어요. 다시 시도해 주세요.", feedback: null };
                }
                render();
            }

            // --- Initializer Bootstrapper ---
            function initApplicationBootstrapLoop() {
                if (window.innerWidth < 1024) {
                    state.isSidebarCollapsed = true;
                }
                render();
                bindEventDelegators();
                
                window.addEventListener('resize', function() {
                    const isMobileWidth = window.innerWidth < 1024;
                    if (isMobileWidth && !state.isSidebarCollapsed) {
                        state.isSidebarCollapsed = true;
                        render();
                    } else if (!isMobileWidth && state.isSidebarCollapsed && state.activeTab !== 'learn') {
                        state.isSidebarCollapsed = false;
                        render();
                    }
                });
            }

            // Initialize App smoothly on DOM load completion
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initApplicationBootstrapLoop);
            } else {
                initApplicationBootstrapLoop();
            }

        })();
    </script>
</body>
</html>
