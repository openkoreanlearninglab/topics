        function stopTick() { if (learn.intervalId) { clearInterval(learn.intervalId); learn.intervalId = null; } }
        function updateSeekUI() { const root = viewRoot(); if (!root) return; const fill = qs('#seek-fill', root), tt = qs('#time-text', root), seek = qs('#seek', root); const pct = learn.duration ? (learn.currentTime / learn.duration) * 100 : 0; if (fill) fill.style.width = pct + '%'; if (tt) tt.textContent = `${fmt(learn.currentTime)} / ${fmt(learn.duration)}`; if (seek) { seek.max = learn.duration || 100; seek.value = learn.currentTime; } }
        function updatePlayBtn() { const root = viewRoot(); if (!root) return; const b = qs('#play-btn', root); if (b) b.innerHTML = learn.isPlaying ? svgIcon('pause', 'w-2.5 h-2.5', { fill: 'currentColor' }) : svgIcon('playSolid', 'w-2.5 h-2.5 ml-0.5', { fill: 'currentColor' }); }
        function replaceLine(id) { const el = qs('#sl-' + id, viewRoot()); if (el) { const line = VIDEO_SCRIPT_DATA.find(l => l.id === id); if (line) el.outerHTML = lineHTML(line); } }
        function setActiveLine(id) { const old = learn.activeLine; learn.activeLine = id; if (old) replaceLine(old); replaceLine(id); if (learn.autoScroll) { const el = qs('#sl-' + id, viewRoot()); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }
        function updatePanes() { const root = viewRoot(); if (!root) return; const vp = qs('#video-pane', root), sp = qs('#script-pane', root), vop = qs('#vocab-pane', root); if (vp) vp.className = videoPaneClass(); if (sp) sp.className = scriptPaneClass(); if (vop) vop.className = vocabPaneClass(); const sl = qs('#script-list', root); if (sl) sl.className = (learn.layout === 'script' ? 'w-full mx-auto p-4 sm:p-8 min-h-full bg-white shadow-sm my-8 max-w-4xl lg:max-w-5xl' : 'p-8 space-y-8'); }
        function rebuildToolbar() { const root = viewRoot(); if (!root) return; const tb = root.querySelector('div.animate-fade-in > div'); if (tb) tb.outerHTML = toolbarHTML(); }

        // ---------- VOCAB (b2: 펼치기형 예문) ----------
        function vocabItemHTML(word, idx) {
            const open = !!vocabExpand[idx];
            const subDefs = (word.subDefs || []).map(s => `<div class="flex flex-col gap-1"><span class="font-serif-kr text-base text-gray-800 font-medium">${esc(s.subTerm)}</span><span class="font-sans-kr text-sm text-gray-500 leading-relaxed">${esc(s.subDef)}</span></div>`).join('');

        function vocabHTML() {

        // ---------- QUIZ (객관식) ----------
        function ensureQuizOpts() { QUIZ_LIST.forEach(q => { if (!quizState.opts[q.id]) quizState.opts[q.id] = shuffleArr(q.options); if (!quizState.q[q.id]) quizState.q[q.id] = { selected: null, showHint: false, showTrans: false, solved: false, attempted: false }; }); }
        function quizScore() { const c = Object.values(quizState.attempts).filter(Boolean).length; return Math.round((c / QUIZ_LIST.length) * 100); }
        function quizItemHTML(quiz) {
            const opts = quizState.opts[quiz.id]; const st = quizState.q[quiz.id];
            const sel = st.selected != null ? opts[st.selected] : null;
            const blank = st.solved ? esc(quiz.correct_word) : (sel && !sel.isCorrect ? esc(sel.text) : '      ');
            const blankCls = st.solved ? 'text-green-600 border-green-500' : (sel && !sel.isCorrect ? 'text-red-500 border-red-400' : 'text-gray-400 border-gray-400 min-w-[80px]');
            const optBtns = opts.map((o, idx) => { let cls = 'bg-white border-gray-200 hover:border-gray-400 hover:shadow-sm text-gray-700'; if (st.solved && o.isCorrect) cls = 'bg-green-50 border-green-500 text-green-800'; else if (sel === o) cls = o.isCorrect ? 'bg-green-50 border-green-500 text-green-800' : 'bg-red-50 border-red-300 text-red-800'; const mark = (st.solved && o.isCorrect) ? '<span class="absolute right-4 top-1/2 -translate-y-1/2 text-green-600">✓</span>' : (sel === o && !o.isCorrect ? '<span class="absolute right-4 top-1/2 -translate-y-1/2 text-red-500">✕</span>' : ''); return `<button type="button" data-opt="${idx}" ${(st.solved && o.isCorrect) ? 'disabled' : ''} class="p-4 text-left border rounded-lg transition-all font-serif text-base relative ${cls}"><span class="font-bold mr-2 text-sm font-sans text-gray-400">${String.fromCharCode(65 + idx)}.</span>${esc(o.text)}${mark}</button>`; }).join('');
            const feedback = sel ? `<div class="p-4 rounded-lg text-sm mb-4 animate-fade-in ${sel.isCorrect ? 'bg-green-50 text-green-800 border border-green-100' : 'bg-red-50 text-red-800 border border-red-100'}"><p class="font-bold mb-1 font-sans">${sel.isCorrect ? '정답입니다! 🎉' : '다시 생각해보세요.'}</p><p class="font-serif leading-relaxed">${esc(sel.feedback)}</p></div>` : '';
            return `<div class="quiz-q mb-16 pb-8 border-b border-gray-100 last:border-0" data-qid="${quiz.id}"><div class="flex items-center gap-3 mb-4"><span class="text-xs font-bold font-sans text-black border border-black px-1.5 py-0.5">Q.${quiz.id}</span><div class="flex flex-col"><h3 class="text-lg font-bold font-serif text-gray-900 leading-snug">${esc(quiz.questionKor)}</h3><p class="text-xs font-sans text-gray-400">${esc(quiz.questionEng)}</p></div></div><div class="bg-gray-50 p-6 rounded-lg mb-6 border border-gray-200"><div class="text-xl font-serif text-gray-900 leading-loose text-left whitespace-pre-wrap"><span>${esc(quiz.sentence_pre)}</span><span class="inline-block border-b-2 px-2 mx-1 font-bold transition-colors ${blankCls}">${blank}</span><span>${esc(quiz.sentence_post)}</span></div>${st.showTrans ? `<div class="mt-6 pt-6 border-t border-gray-200 text-left animate-fade-in"><p class="text-xs font-sans text-gray-400 mb-1">Translation:</p><p class="text-sm font-serif text-gray-600 leading-relaxed">${esc(quiz.translation_pre)}<strong>${esc(quiz.translation_answer || quiz.correct_word)}</strong>${esc(quiz.translation_post)}</p></div>` : ''}</div><div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6">${optBtns}</div>${feedback}<div class="flex items-center gap-4 text-xs font-bold font-sans"><button type="button" data-q="hint" class="text-gray-400 hover:text-journal-black uppercase tracking-widest transition-colors">Hint</button><div class="h-3 w-px bg-gray-300"></div>${transBtn('q-trans', st.showTrans)}</div>${st.showHint ? `<div class="mt-3 text-sm font-sans text-gray-500 italic animate-fade-in">💡 Hint: ${esc(quiz.hint)}</div>` : ''}</div>`;
        }
        function quizHTML() {
            ensureQuizOpts();
            return `<div class="max-w-3xl mx-auto w-full px-6 py-12 animate-fade-in flex flex-col gap-8"><div class="mb-12 md:mb-16 text-center"><h2 class="font-serif-kr text-3xl md:text-4xl text-gray-900 font-semibold leading-tight">내용 확인 퀴즈</h2><span class="block font-eng-header text-[11px] md:text-xs tracking-[0.2em] text-gray-400 uppercase mt-2">Comprehension Quiz</span><div class="w-12 h-px bg-gray-200 mx-auto mt-12 md:mt-16"></div></div><div class="flex-1" id="quiz-list">${QUIZ_LIST.map(quizItemHTML).join('')}</div><div class="mt-8 pt-12 border-t border-gray-100 flex flex-col items-center gap-10"><div class="flex flex-col items-center"><span class="text-[10px] font-bold font-eng-header text-gray-400 uppercase tracking-[0.2em] mb-2">정답률 / Accuracy</span><span class="text-5xl font-serif-kr font-bold text-journal-black tracking-tight" id="quiz-score">${quizScore()}%</span></div><button type="button" data-action="quiz-retry" class="group flex items-center gap-3 px-6 py-3 bg-white border border-gray-200 hover:border-black hover:bg-gray-50 transition-all duration-300">${svgIcon('retry', 'w-4 h-4 text-gray-400 group-hover:text-black transition-colors')}<div class="flex flex-col items-start leading-none gap-1"><span class="text-xs font-bold font-sans-kr text-gray-900 group-hover:text-black">다시 풀기</span><span class="text-[9px] font-eng-header font-medium tracking-wider text-gray-400 group-hover:text-gray-600 uppercase">Retry</span></div></button></div></div>`;
        }
        function rerenderQuizQ(qid) { const el = qs(`.quiz-q[data-qid="${qid}"]`, viewRoot()); if (el) el.outerHTML = quizItemHTML(QUIZ_LIST.find(q => q.id === qid)); }
        function updateQuizScore() { const sc = qs('#quiz-score', viewRoot()); if (sc) sc.textContent = quizScore() + '%'; }

        // ---------- DISCUSS ----------
        function feedbackSectionHTML(titleKor, titleEng, contentHTML, isCorrection) { return `<div><h4 class="text-[10px] font-bold font-sans text-gray-400 uppercase tracking-widest mb-2 flex items-center gap-2">${esc(titleKor)} <span class="font-eng-header font-medium text-[9px]">${esc(titleEng)}</span></h4><p class="${isCorrection ? 'text-[15px] md:text-base font-serif text-gray-900 leading-relaxed font-medium bg-white p-4 border border-gray-200 shadow-sm rounded-sm' : 'text-[13px] md:text-sm font-sans text-gray-700 leading-relaxed whitespace-pre-wrap'}">${contentHTML}</p></div>`; }
        function discussItemHTML(item) {
            const st = discussState[item.id] || (discussState[item.id] = { text: '', showTrans: false, generating: false, feedback: null, error: '' });
            const vocab = item.vocab.map(v => `<p class="text-sm font-serif text-gray-700"><span class="font-bold text-black mr-2">${esc(v.term)}</span>${esc(v.def)}</p>`).join('');
            let fb = '';
            if (st.error) fb = `<div class="mt-4 p-4 text-sm text-red-600 bg-red-50 border border-red-100 rounded-sm animate-fade-in">${esc(st.error)}</div>`;
            else if (st.feedback) {
                const fd = st.feedback;
                const details = (fd.detailed_corrections && fd.detailed_corrections.length) ? `<div><h4 class="text-[10px] font-bold font-sans text-gray-400 uppercase tracking-widest mb-3 flex items-center gap-2">상세 설명 <span class="font-eng-header font-medium text-[9px]">EXPLANATION</span></h4><div class="space-y-3">${fd.detailed_corrections.map(d => `<div class="bg-white p-4 border border-gray-100 rounded-sm hover:border-gray-200 transition-colors">${(d.original || d.corrected) ? `<div class="flex flex-wrap items-center gap-3 mb-2.5 text-[15px] font-serif">${d.original ? `<span class="text-red-400 line-through decoration-red-300/60">${esc(d.original)}</span>` : ''}${(d.original && d.corrected) ? '<span class="text-gray-300">→</span>' : ''}${d.corrected ? `<span class="text-gray-900 font-bold tracking-wide">${esc(d.corrected)}</span>` : ''}</div>` : ''}<p class="text-[13px] md:text-sm font-sans text-gray-600 leading-relaxed">${renderFormatted(d.explanation)}</p></div>`).join('')}</div></div>` : '';
                fb = `<div class="mt-8 p-6 bg-gray-50 border border-gray-200 rounded-sm animate-fade-in relative"><div class="flex items-center gap-2 mb-6 pb-4 border-b border-gray-200">${svgIcon('sparkles', 'w-5 h-5 text-gray-900', { fill: 'currentColor' })}<span class="text-xs font-bold font-sans text-gray-900 uppercase tracking-widest">AI Teacher Feedback</span></div><div class="space-y-8">${feedbackSectionHTML('피드백', 'FEEDBACK', renderFormatted(fd.feedback))}${feedbackSectionHTML('모범 답안', 'CORRECTION', esc(fd.correction), true)}${details}</div><div class="mt-8 pt-4 border-t border-gray-200"><p class="text-[10px] text-gray-400 font-sans text-center">※ AI가 생성한 피드백이므로 간혹 부자연스럽거나 오류가 있을 수 있습니다.</p></div></div>`;
            }
            const disabled = (!st.text.trim() || st.generating);
            return `<div class="discuss-q mb-16 group" data-did="${item.id}"><div class="flex items-center gap-4 mb-6"><span class="text-4xl font-serif font-bold text-gray-200 transition-colors duration-300 group-hover:text-gray-900">${String(item.id).padStart(2, '0')}</span><h3 class="text-xl font-serif font-bold text-gray-900 leading-normal whitespace-pre-line">${esc(item.questionKor)}</h3></div><div class="pl-0 md:pl-14"><div class="flex gap-2 mb-4">${transBtn('discuss-qtrans', st.showTrans)}${st.showTrans ? `<p class="text-sm font-sans text-gray-500 animate-fade-in whitespace-pre-line">${esc(item.questionEng)}</p>` : ''}</div><div class="bg-gray-50 p-5 mb-6 border-l-2 border-black"><span class="text-xs font-bold font-sans text-gray-400 uppercase mb-2 block tracking-widest">Key Vocabulary</span><div class="space-y-1">${vocab}</div></div><textarea data-action="discuss-text" placeholder="여기에 생각을 적어보세요..." class="w-full p-4 border border-gray-300 font-serif text-base text-gray-900 focus:border-black focus:ring-0 outline-none min-h-[150px] bg-white resize-y mb-3 transition-colors placeholder:text-gray-300">${esc(st.text)}</textarea><div class="flex justify-end"><button type="button" data-action="discuss-feedback" ${disabled ? 'disabled' : ''} class="px-6 py-2 text-xs font-bold font-sans uppercase tracking-widest border transition-colors flex items-center gap-2 ${disabled ? 'border-gray-200 text-gray-300 cursor-not-allowed' : 'border-black bg-black text-white hover:bg-white hover:text-black'}">${st.generating ? '<div class="w-3 h-3 border-2 border-current border-t-transparent rounded-full animate-spin"></div>Generating...' : 'Get AI Feedback'}</button></div>${fb}</div></div>`;
        }
        function discussHTML() {
            return `<div class="max-w-3xl mx-auto w-full px-6 py-12 animate-fade-in"><div class="mb-12 md:mb-16 text-center"><h2 class="font-serif-kr text-3xl md:text-4xl text-gray-900 font-semibold leading-tight">생각해 보기</h2><span class="block font-eng-header text-[11px] md:text-xs tracking-[0.2em] text-gray-400 uppercase mt-2">Food For Thought</span></div><div class="bg-gray-50 border border-gray-200 py-4 px-5 mb-24 md:mb-32 rounded-none flex flex-col sm:flex-row sm:items-center justify-between gap-4"><div class="flex gap-4 items-center"><div class="shrink-0 text-gray-400">${svgIcon('sparkles', 'w-5 h-5', { fill: 'currentColor' })}</div><div class="flex flex-col"><p class="text-xs font-bold font-sans text-gray-800 leading-tight">AI 피드백은 현재 Gemini 웹에서만 가능합니다.</p><p class="text-[10px] font-sans text-gray-400 mt-1">AI feedback is currently available only on Gemini web.</p></div></div><a href="https://gemini.google.com/share/3fcffc13502b" target="_blank" rel="noreferrer" class="group flex flex-col items-center justify-center bg-white py-1.5 px-3 shadow-sm hover:shadow transition-all shrink-0 no-underline rounded-none border border-gray-100"><div class="flex items-center gap-1"><span class="text-[11px] font-bold font-sans text-gray-700 group-hover:text-black">Gemini에서 열기</span>${svgIcon('externalLink', 'w-3 h-3 text-gray-400 group-hover:text-black')}</div><span class="text-[9px] font-sans text-gray-400 group-hover:text-gray-600 uppercase tracking-widest mt-0.5">Open in Gemini</span></a></div><div id="discuss-list">${DISCUSS_DATA.map(discussItemHTML).join('')}</div></div>`;
        }
        function rerenderDiscussItem(id) { const el = qs(`.discuss-q[data-did="${id}"]`, viewRoot()); if (el) el.outerHTML = discussItemHTML(DISCUSS_DATA.find(d => d.id === id)); }

        // ---------- 이벤트 위임 ----------
        appEl.addEventListener('click', (e) => {
            const tabBtn = e.target.closest('[data-tab]'); if (tabBtn) { setTab(tabBtn.dataset.tab); return; }
            if (e.target.closest('[data-action="toggle-header"]')) { app.headerExpanded = !app.headerExpanded; buildApp(); return; }
            const tab = app.activeTab;
            if (tab === 'video') {
                const vspan = e.target.closest('[data-vocab-idx]'); if (vspan) { e.stopPropagation(); const w = VOCAB_DATA[+vspan.dataset.vocabIdx]; const r = vspan.getBoundingClientRect(); if (popupEl && popupEl.dataset.fixed && popupEl.dataset.idx == String(VOCAB_DATA.indexOf(w))) closeVocabPopup(); else showVocabPopup(w, r.left + r.width / 2, r.bottom, true); return; }
                const lay = e.target.closest('[data-layout]'); if (lay) { learn.layout = lay.dataset.layout; const sl = qs('#script-list', viewRoot()); if (sl) sl.innerHTML = scriptListHTML(); updatePanes(); rebuildToolbar(); return; }
                const rate = e.target.closest('[data-rate]'); if (rate) { learn.rate = parseFloat(rate.dataset.rate); learn.speedMenu = false; if (learn.player && learn.player.setPlaybackRate) learn.player.setPlaybackRate(learn.rate); rebuildToolbar(); return; }
                const lp = e.target.closest('[data-line-play]'); if (lp) { e.stopPropagation(); const id = lp.dataset.linePlay; const line = VIDEO_SCRIPT_DATA.find(l => l.id === id); if (learn.activeLine === id && learn.isPlaying) { if (learn.player) learn.player.pauseVideo(); } else if (learn.player) { learn.player.seekTo(line.time[0], true); learn.player.playVideo(); } return; }
                const lt = e.target.closest('[data-action^="line-trans-"]'); if (lt) { e.stopPropagation(); const id = lt.dataset.action.replace('line-trans-', ''); learn.trans[id] = !learn.trans[id]; replaceLine(id); return; }
                const seekLine = e.target.closest('[data-line-seek]'); if (seekLine) { if (learn.player) { learn.player.seekTo(parseFloat(seekLine.dataset.lineSeek), true); learn.player.playVideo(); } return; }
                const sb = e.target.closest('[data-sb-idx]'), sbBtn = e.target.closest('[data-action^="sb-trans-"]'); if (sb && sbBtn) { const i = +sb.dataset.sbIdx; learn.sbTrans[i] = !learn.sbTrans[i]; sb.outerHTML = sidebarVocabHTML(VOCAB_DATA[i], i); return; }
                const a = e.target.closest('[data-action]'); if (a) { const act = a.dataset.action; if (act === 'rewind') { if (learn.player) { const n = Math.max(0, learn.currentTime - 1.5); learn.player.seekTo(n, true); learn.currentTime = n; updateSeekUI(); } } else if (act === 'forward') { if (learn.player) { const n = Math.min(learn.duration, learn.currentTime + 1.5); learn.player.seekTo(n, true); learn.currentTime = n; updateSeekUI(); } } else if (act === 'play') { if (learn.player) { if (learn.isPlaying) learn.player.pauseVideo(); else learn.player.playVideo(); } } else if (act === 'speed-menu') { learn.speedMenu = !learn.speedMenu; rebuildToolbar(); } else if (act === 'autoscroll') { learn.autoScroll = !learn.autoScroll; rebuildToolbar(); } else if (act === 'learn-vocab') { learn.showVocab = !learn.showVocab; updatePanes(); rebuildToolbar(); } }
                return;
            }
            if (tab === 'vocab') { const card = e.target.closest('[data-vidx]'); const exBtn = e.target.closest('[data-action="vocab-ex"]'); if (card && exBtn) { const i = +card.dataset.vidx; vocabExpand[i] = !vocabExpand[i]; card.outerHTML = vocabItemHTML(VOCAB_DATA[i], i); } return; }
            if (tab === 'quiz') {
                const retry = e.target.closest('[data-action="quiz-retry"]'); if (retry) { quizState.attempts = {}; quizState.q = {}; quizState.opts = {}; paint(); return; }
                const qEl = e.target.closest('.quiz-q'); if (!qEl) return; const qid = +qEl.dataset.qid; const quiz = QUIZ_LIST.find(q => q.id === qid); const st = quizState.q[qid];
                const opt = e.target.closest('[data-opt]'); if (opt) { const idx = +opt.dataset.opt; const o = quizState.opts[qid][idx]; if (st.solved && o.isCorrect) return; st.selected = idx; if (!st.attempted) { st.attempted = true; quizState.attempts[qid] = o.isCorrect; } if (o.isCorrect) st.solved = true; rerenderQuizQ(qid); updateQuizScore(); return; }
                const q = e.target.closest('[data-q]'); if (q) { if (q.dataset.q === 'hint') st.showHint = !st.showHint; rerenderQuizQ(qid); return; }
                const tr = e.target.closest('[data-action="q-trans"]'); if (tr) { st.showTrans = !st.showTrans; rerenderQuizQ(qid); return; }
                return;
            }
            if (tab === 'discuss') {
                const a = e.target.closest('[data-action]'); if (!a) return; const qEl = a.closest('.discuss-q'); const id = +qEl.dataset.did; const st = discussState[id];
                if (a.dataset.action === 'discuss-qtrans') { st.showTrans = !st.showTrans; rerenderDiscussItem(id); }
                else if (a.dataset.action === 'discuss-feedback') { runDiscussFeedback(id); }
                return;
            }
        });
        appEl.addEventListener('input', (e) => {
            const tab = app.activeTab;
            if (tab === 'discuss' && e.target.matches('[data-action="discuss-text"]')) { const id = +e.target.closest('.discuss-q').dataset.did; const st = discussState[id]; const was = !st.text.trim(); st.text = e.target.value; if (was !== !st.text.trim()) { const pos = e.target.selectionStart; rerenderDiscussItem(id); const ta = qs(`.discuss-q[data-did="${id}"] [data-action="discuss-text"]`, viewRoot()); if (ta) { ta.focus(); try { ta.setSelectionRange(pos, pos); } catch (_) {} } } }
        });
        appEl.addEventListener('mouseover', (e) => { if (app.activeTab !== 'video') return; const sp = e.target.closest && e.target.closest('[data-vocab-idx]'); if (!sp) return; if (popupEl && popupEl.dataset.fixed) return; const w = VOCAB_DATA[+sp.dataset.vocabIdx]; const r = sp.getBoundingClientRect(); showVocabPopup(w, r.left + r.width / 2, r.bottom, false); });
        appEl.addEventListener('mouseout', (e) => { if (app.activeTab !== 'video') return; const sp = e.target.closest && e.target.closest('[data-vocab-idx]'); if (!sp) return; if (popupEl && popupEl.dataset.fixed) return; if (e.relatedTarget && sp.contains(e.relatedTarget)) return; closeVocabPopup(); });
        window.addEventListener('keydown', (e) => {
            if (app.activeTab !== 'video') return; if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
            if (e.code === 'Space') { e.preventDefault(); const p = learn.player; if (p && p.getPlayerState) { if (p.getPlayerState() === 1) p.pauseVideo(); else p.playVideo(); } }
            else if (e.code === 'ArrowLeft') { e.preventDefault(); const i = VIDEO_SCRIPT_DATA.findIndex(l => l.id === learn.activeLine); if (i > 0 && learn.player) { learn.player.seekTo(VIDEO_SCRIPT_DATA[i - 1].time[0], true); learn.player.playVideo(); } }
            else if (e.code === 'ArrowRight') { e.preventDefault(); const i = VIDEO_SCRIPT_DATA.findIndex(l => l.id === learn.activeLine); const ni = (i === -1) ? 0 : i + 1; if (ni < VIDEO_SCRIPT_DATA.length && learn.player) { learn.player.seekTo(VIDEO_SCRIPT_DATA[ni].time[0], true); learn.player.playVideo(); } }
        });

        async function runDiscussFeedback(id) {
            const st = discussState[id]; if (!st.text.trim() || st.generating) return; st.generating = true; st.error = ''; st.feedback = null; rerenderDiscussItem(id);
            const item = DISCUSS_DATA.find(d => d.id === id); const lvl = app.userLevel;
            const beginner = ['A1', 'A1+', 'A2', 'A2+', 'B1', 'B1+'].includes(lvl);
            const instr = beginner ? `The student's level is ${lvl}. Write 'feedback' in ENGLISH; 'correction' in natural Korean; 'detailed_corrections' explanations in ENGLISH, wrapping Korean words in **bold**.` : `학생 레벨은 ${lvl}. 모든 필드를 한국어로만 작성. explanation 안 한국어 강조는 **단어** 사용.`;
            const vocabCtx = item.vocab ? item.vocab.map(v => `- ${v.term}: ${v.def}`).join('\n') : '없음';
            const sys = `당신은 한국어 선생님입니다.\n${instr}\n맞춤법·띄어쓰기·문법 오류를 찾고, 'correction'은 해요체로. JSON만 응답(마크다운 금지): {"feedback":"","correction":"","detailed_corrections":[{"original":"","corrected":"","explanation":""}]}\n[핵심 어휘]\n${vocabCtx}`;
            const payload = { contents: [{ role: 'user', parts: [{ text: `${sys}\n\n질문: "${item.questionKor}"\n학생 답변: "${st.text}"` }] }], generationConfig: { responseMimeType: 'application/json' } };
            try { const r = await callGeminiWithBackoff(payload); const txt = r.candidates && r.candidates[0] && r.candidates[0].content.parts[0].text; if (!txt) throw new Error('피드백을 생성하지 못했습니다.'); st.feedback = JSON.parse(txt.replace(/^```(json)?\n?/, '').replace(/\n?```$/, '').trim()); }
            catch (err) { st.error = '오류가 발생했습니다. 잠시 후 다시 시도해주세요.'; }
            finally { st.generating = false; rerenderDiscussItem(id); }
        }

        buildApp();
    })();
    </script>
