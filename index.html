<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이 주제로 이야기해 봐요!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        .level-badge {
            font-size: 0.85rem;
            padding: 0.2rem 0.6rem;
            border-radius: 9999px;
            font-weight: 700;
            display: inline-block;
            margin-right: 0.5rem;
            min-width: 3.5rem;
            text-align: center;
        }
        .level-a1 { background-color: #dbf4ff; color: #0077b6; }
        .level-a1plus { background-color: #cffafe; color: #0891b2; }
        .level-a2 { background-color: #d1fae5; color: #059669; }
        .level-b1 { background-color: #ffedd5; color: #ea580c; }
        .level-b1plus { background-color: #fce7f3; color: #be185d; }
        .level-b2 { background-color: #f3e8ff; color: #7e22ce; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 sm:p-8">

    <noscript>
        <div class="max-w-3xl mx-auto my-10 p-6 bg-red-50 border border-red-200 rounded-xl text-center">
            <p class="text-red-700 font-semibold">이 사이트는 자바스크립트가 활성화되어 있어야 올바르게 작동합니다.</p>
            <p class="text-slate-500 text-sm mt-1">Please enable JavaScript in your browser to view this site.</p>
        </div>
    </noscript>

    <!-- Main Container App -->
    <div id="app" class="max-w-3xl mx-auto">
        
        <!-- 헤더 섹션 (메인 타이틀) -->
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 mb-2">
                이 주제로 이야기해 봐요!
            </h1>
            <p class="text-slate-500 text-lg mb-4">
                Let's talk about this topic
            </p>
            <!-- 상단 italki 프로필 링크 -->
            <a href="https://www.italki.com/ko/teacher/3553151" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 px-5 py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-full text-sm font-semibold transition-colors border border-blue-200 shadow-sm">
                <span>Visit Sangbin's italki profile</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
        </header>

        <!-- 검색 및 필터 컨트롤 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 sticky top-4 z-10 border border-slate-200">
            <div class="flex flex-col sm:flex-row gap-3 justify-between items-center">
                <!-- 검색창 -->
                <div class="relative w-full sm:w-1/2">
                    <input type="text" id="searchInput" placeholder="제목 검색..." 
                           class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    <svg class="w-5 h-5 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                
                <!-- 필터 버튼 컨테이너 (JS에서 동적 상태 반영해 클래스 업데이트) -->
                <div class="flex gap-2 overflow-x-auto w-full sm:w-auto pb-1 sm:pb-0" id="filterContainer">
                    <button data-filter="all" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn active-filter-btn">전체</button>
                    <button data-filter="A1" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">A1</button>
                    <button data-filter="A1+" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">A1+</button>
                    <button data-filter="A2" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">A2</button>
                    <button data-filter="A2+" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">A2+</button>
                    <button data-filter="B1" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">B1</button>
                    <button data-filter="B2" class="px-4 py-2 rounded-lg text-sm font-medium transition whitespace-nowrap filter-btn">B2</button>
                </div>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 (JS 동적 렌더링 목적) -->
        <div id="sectionsContainer" class="space-y-8">
            <!-- JS가 활성화되면 여기에 섹션이 빌드됩니다 -->
        </div>

        <!-- 검색 결과 없음 메시지 골격 -->
        <div id="noResults" class="hidden p-8 text-center text-gray-500 bg-white rounded-xl shadow-sm border border-slate-200">
            검색 결과가 없습니다.
        </div>

        <!-- 푸터 섹션 -->
        <footer class="mt-10 text-center text-slate-400 text-sm pb-10">
            <p class="mb-2">
                &copy; 2025 - 2026 Sangbin Lee (OpenKoreanLearningLap). All rights reserved.
            </p>
            <a href="https://www.italki.com/ko/teacher/3553151" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 hover:text-blue-500 transition-colors duration-200 underline decoration-1 underline-offset-4">
                <span>Visit Sangbin's italki profile</span>
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            </a>
        </footer>
    </div>

    <script>
        (function() {
            'use strict';

            // 1. DATA CENTER: 콘텐츠 데이터 일체를 완전히 선언부로 분리함 (HTML 하드코딩 제거)
            var TOPICS_DATA = [
                // === 섹션 1: 일반 주제 ===
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '영화를 어떻게 봐요? — 결말 먼저 보기 vs 처음부터 보기',
                    href: 'a2plus-watch-ending-first.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: 'SNS를 어떤 목적으로 써요?',
                    href: 'b1-sns-purpose.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: '감칠맛과 MSG - 오해와 진실',
                    href: 'b1-umami-and-msg.html'
                },
                {
                    section: 'talk',
                    level: 'B1+',
                    title: '뒷담화는 나쁠까요? 괜찮을까요?',
                    href: 'b1plus-is-gossip-bad.html'
                },
                {
                    section: 'talk',
                    level: 'B2',
                    title: '조상 찾기 DNA 검사',
                    href: 'b2-ancestry-dna-test.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: '보통 어떤 음악을 들어요? - 잔잔한 음악 vs 신나는 음악',
                    href: 'b1-what-music-do-you-listen-to.html'
                },
                {
                    section: 'talk',
                    level: 'B1+',
                    title: '한국의 크리스마스 케이크',
                    href: 'b1plus-korean-christmas-cake.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '마음에 들지 않는 선물',
                    href: 'a2plus-gift-not-liked.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '드라마 시청 습관: 몰아 보기 vs 매주 보기',
                    href: 'a2plus-drama-watching-habits.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: '왼손잡이에 대한 오해와 진실',
                    href: 'b1-left-handed.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '말차 라떼',
                    href: 'a2plus-matcha-latte.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: '뇌 이야기: 기억력과 집중력',
                    href: 'b1-brain.html'
                },
                {
                    section: 'talk',
                    level: 'B1',
                    title: '체크리스트가 사람들을 멍청하게 만들까요?',
                    href: 'b1-checklists-stupid.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '오늘 일을 다 못했어요: 늦게까지 일할 거예요 vs 내일 일할 거예요',
                    href: 'a2plus-overtime.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '잘못 나온 음식',
                    href: 'a2plus-wrong-food.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '여름 에어컨 고장 VS 겨울 보일러 고장',
                    href: 'a2plus-summer-winter.html'
                },
                {
                    section: 'talk',
                    level: 'A2+',
                    title: '선크림이 피부를 지켜줘요',
                    href: 'a2plus-sunscreen.html'
                },
                {
                    section: 'talk',
                    level: 'A2',
                    title: '주말에 보통 뭐 해요?',
                    href: 'a2-weekend.html'
                },

                // === 섹션 2: 쉬운 한국어 ===
                {
                    section: 'easy',
                    level: 'A1+',
                    title: '어디가 아파요?',
                    href: 'a1plus-where-does-it-hurt.html'
                },
                {
                    section: 'easy',
                    level: 'A1+',
                    title: '책을 몇 권 읽어요? (How Many Books Do You Read?)',
                    href: 'a1plus-how-many-books.html'
                },
                {
                    section: 'easy',
                    level: 'A1',
                    title: '오늘 뭐 해요?',
                    href: 'a1-easy-today-what-doing.html'
                },
                {
                    section: 'easy',
                    level: 'A1',
                    title: '하루에 커피를 몇 잔 마셔요?',
                    href: 'a1-how-many-cups-of-coffee.html'
                },

                // === 섹션 3: 학습 자료 ===
                {
                    section: 'study',
                    level: 'B1',
                    title: '인생 첫 사우나 - 나는 마루',
                    href: 'b1-first-sauna-maru.html',
                    tags: ['문화', '일상']
                },
                {
                    section: 'study',
                    level: 'B1+',
                    title: '두바이 쫀득 쿠키, 뭐길래 인기가 많을까요?',
                    href: 'b1plus-dubai-chewy-cookie.html'
                }
            ];

            // 2. STATE (진실의 원천 - 단일 관리)
            var state = {
                currentFilter: 'all',
                searchText: ''
            };

            // 3. UTILITY: HTML 안전 이스케이프 함수
            function escapeHtml(str) {
                if (typeof str !== 'string') return '';
                return str
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            // 난이도 뱃지 스타일 맵핑 함수
            function getLevelBadgeClass(level) {
                var normalized = level.toLowerCase().replace('+', 'plus');
                return 'level-badge level-' + normalized;
            }

            // 4. RENDERING PIPELINE: State -> HTML 갱신
            function render() {
                var sectionsContainer = document.getElementById('sectionsContainer');
                var noResults = document.getElementById('noResults');
                
                // 각 섹션 그룹화 골격 정의
                var sectionsConfig = [
                    {
                        id: 'talk',
                        title: '이 주제로 이야기해 봐요!',
                        subtitle: 'Let\'s talk about this topic',
                        colorClass: 'bg-blue-500'
                    },
                    {
                        id: 'easy',
                        title: '쉬운 한국어로 이야기해 봐요',
                        subtitle: 'Let\'s Chat in Easy Korean',
                        colorClass: 'bg-green-500'
                    },
                    {
                        id: 'study',
                        title: '학습 자료',
                        subtitle: 'Learning Content',
                        colorClass: 'bg-purple-500'
                    }
                ];

                var totalVisibleCount = 0;
                var sectionsHtml = '';

                // 각 대분류 섹션별 루프 가동
                sectionsConfig.forEach(function(secConf) {
                    // 현재 소속 섹션 데이터 수집 및 검색/필터 적용
                    var filteredItems = TOPICS_DATA.filter(function(item) {
                        if (item.section !== secConf.id) return false;

                        // 필터 매치 체크
                        var matchesFilter = false;
                        if (state.currentFilter === 'all') {
                            matchesFilter = true;
                        } else if (state.currentFilter === 'B1') {
                            // 필터 규칙: B1 선택시 B1+도 포함
                            matchesFilter = (item.level === 'B1' || item.level === 'B1+');
                        } else {
                            matchesFilter = (item.level === state.currentFilter);
                        }

                        // 검색어 매치 체크
                        var matchesSearch = item.title.toLowerCase().indexOf(state.searchText.toLowerCase()) !== -1;

                        return matchesFilter && matchesSearch;
                    });

                    // 해당 섹션에 유효한 결과가 있을 경우에만 섹션 자체를 그림
                    if (filteredItems.length > 0) {
                        totalVisibleCount += filteredItems.length;

                        var listHtml = '';
                        filteredItems.forEach(function(item) {
                            var tagHtml = '';
                            // 태그 정보가 포함되어 있는 경우 태그 뱃지들을 조립
                            if (item.tags && Array.isArray(item.tags)) {
                                var tagSpans = item.tags.map(function(t) {
                                    return '<span class="px-2 py-0.5 bg-slate-100 text-slate-500 text-xs rounded-md font-medium">#' + escapeHtml(t) + '</span>';
                                }).join('');
                                tagHtml = '<div class="flex gap-1.5 pl-14 sm:pl-0">' + tagSpans + '</div>';
                            }

                            listHtml += 
                                '<li class="topic-item hover:bg-slate-50 transition duration-200">' +
                                    '<a href="' + escapeHtml(item.href) + '" class="block p-5 sm:p-6 group">' +
                                        '<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">' +
                                            '<div class="flex items-center gap-1">' +
                                                '<span class="' + getLevelBadgeClass(item.level) + '">' + escapeHtml(item.level) + '</span>' +
                                                '<span class="text-lg font-semibold text-slate-800 group-hover:text-blue-600 transition">' + 
                                                    escapeHtml(item.title) + 
                                                '</span>' +
                                            '</div>' +
                                            tagHtml +
                                        '</div>' +
                                    '</a>' +
                                '</li>';
                        });

                        sectionsHtml += 
                            '<div class="topic-section">' +
                                '<h2 class="text-xl font-bold text-slate-700 mb-3 px-1 flex items-center">' +
                                    '<span class="' + secConf.colorClass + ' w-1.5 h-6 rounded-full mr-2"></span>' +
                                    escapeHtml(secConf.title) + 
                                    ' <span class="text-sm font-normal text-slate-400 ml-2">(' + escapeHtml(secConf.subtitle) + ')</span>' +
                                '</h2>' +
                                '<div class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">' +
                                    '<ul class="divide-y divide-slate-100">' +
                                        listHtml +
                                    '</ul>' +
                                '</div>' +
                            '</div>';
                    }
                });

                // 콘텐츠 컨테이너 렌더링 반영
                sectionsContainer.innerHTML = sectionsHtml;

                // 검색 결과 부재 여부에 따라 '검색 결과 없음' 창 제어
                if (totalVisibleCount === 0) {
                    noResults.classList.remove('hidden');
                } else {
                    noResults.classList.add('hidden');
                }

                // 필터 버튼의 액티브 스타일을 동적으로 적용
                updateFilterButtonsUi();
            }

            // 필터 버튼들의 시각 상태를 현재 state에 맞게 강제 동기화
            function updateFilterButtonsUi() {
                var filterButtons = document.querySelectorAll('.filter-btn');
                filterButtons.forEach(function(btn) {
                    var btnFilter = btn.getAttribute('data-filter');
                    
                    if (btnFilter === state.currentFilter) {
                        btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-slate-800 text-white hover:bg-slate-700 transition whitespace-nowrap filter-btn active-filter-btn';
                    } else {
                        // 난이도별 호버 컬러 매칭
                        var hoverBg = 'hover:bg-slate-200';
                        if (btnFilter === 'A1') hoverBg = 'hover:bg-blue-100';
                        else if (btnFilter === 'A1+') hoverBg = 'hover:bg-cyan-100';
                        else if (btnFilter === 'A2' || btnFilter === 'A2+') hoverBg = 'hover:bg-green-100';
                        else if (btnFilter === 'B1') hoverBg = 'hover:bg-orange-100';
                        else if (btnFilter === 'B2') hoverBg = 'hover:bg-purple-100';

                        btn.className = 'px-4 py-2 rounded-lg text-sm font-medium bg-slate-200 text-slate-700 transition whitespace-nowrap filter-btn ' + hoverBg;
                    }
                });
            }

            // 5. EVENT SYSTEM: 루트 `#app` 단에만 등록하는 이벤트 위임 아키텍처
            function initEvents() {
                var appContainer = document.getElementById('app');
                var searchInput = document.getElementById('searchInput');

                // 필터 버튼 클릭 처리 위임
                appContainer.addEventListener('click', function(e) {
                    var targetButton = e.target.closest('.filter-btn');
                    if (targetButton) {
                        var selectedFilter = targetButton.getAttribute('data-filter');
                        if (selectedFilter) {
                            state.currentFilter = selectedFilter;
                            render(); // 상태가 변경되었으므로 동적 재렌더
                        }
                    }
                });

                // 검색 입력 처리 위임
                searchInput.addEventListener('keyup', function(e) {
                    var val = e.target.value || '';
                    if (state.searchText !== val) {
                        state.searchText = val;
                        render(); // 상태가 변경되었으므로 동적 재렌더
                    }
                });
            }

            // DOM 트리가 로드되는 시점에 최초 렌더 가동
            window.addEventListener('DOMContentLoaded', function() {
                initEvents();
                render();
            });

        })();
    </script>
</body>
</html>
