<body class="min-h-screen bg-white">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-6 lg:px-8 h-16 flex items-center justify-between gap-6">
            <a href="#" id="logo-home" class="flex items-center gap-2 shrink-0">
                <span class="font-serif text-lg md:text-xl font-bold text-black tracking-tight">OpenKoreanLab</span>
            </a>
            <nav id="nav-container" class="flex items-center gap-1 overflow-x-auto scrollbar-none"></nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 lg:px-8 pt-16 md:pt-24 pb-24 animate-fade-in">
        <noscript>
            <div class="max-w-6xl mx-auto px-6 lg:px-8 mt-6 mb-2 p-4 border border-gray-300 rounded-lg text-sm font-sans text-gray-700">

            </div>
        </noscript>
        <!-- Hero Section -->
        <div id="hero-container" class="flex flex-col items-start mb-12 md:mb-16"></div>

        <!-- Search + Tags Section -->
        <div class="flex flex-col gap-5 mb-10 md:mb-12">
            <div class="relative w-full md:max-w-md">
                <div class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">

                />
                <button
                    id="search-clear-btn" aria-label="검색어 지우기"
                    class="hidden absolute right-3 top-1/2 -translate-y-1/2 p-1 text-gray-400 hover:text-black transition-colors"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4">
                        <path d="M18 6 6 18" /><path d="m6 6 12 12" />
                    </svg>
                </button>
            </div>

            <div id="tags-container" class="flex flex-wrap gap-2"></div>

            { level: "C2", tags: ["정치"], title: "한국 정당의 후보 공천에서 나타나는 문제점", link: "https://drive.google.com/open?id=1rhYprUabOdjILDAaiPNqjgsdiCmZ70er5e-HWLoKsuM&usp=drive_copy" },

            { level: "C2", tags: ["정치", "사회"], title: "북한 이탈 주민의 정체성", link: "https://drive.google.com/open?id=1PN6lqGr2G9dFeAtGi85WwBGfIW9Uk8Q1h8Mr-u-5HpQ&usp=drive_copy" },

            { level: "C2", tags: ["철학", "과학"], title: "과학과 철학 그리고 언어 - 철학으로 보는 과학", link: "https://drive.google.com/open?id=1NDDNBUuj2RRPPBOrwpSV3gWTRrbMG5QhHyxTSv_ENKQ&usp=drive_copy" },
            { level: "C2", tags: ["철학", "과학"], title: "시간에 대한 태도와 무시제적 시간 이론", link: "https://drive.google.com/open?id=1yX5y4-ugi7mewufTKc8LRIRDaBcVgq6UybVSBe_XzsE&usp=drive_copy" },
            { level: "C2", tags: ["철학", "교육"], title: "<메논>과 <무지한 스승>을 통해 알아보는 배움의 정의: 설명 없이 배울 수 있을까?", link: "https://drive.google.com/open?id=1ZKkboh1LzYDRC3HW1--1zcfWmpcTEVQ8RmCjURXuIXM&usp=drive_copy" },
            { level: "C2", tags: ["철학", "언어"], title: "말할 수 없는 것은 침묵해야 한다 : 언어와 삶", link: "https://drive.google.com/open?id=14rzpxQAEauYPqTUUD91io6gqhxgMpYedlrdBcD7xJx0&usp=drive_copy" },
            { level: "C2", tags: ["철학", "언어"], title: "표상과 현상은 무엇일까요?", link: "https://drive.google.com/open?id=1e2mKtmrd3gN2EIVVQ4oWjC3c4PHYJHZqyY5DAHKkAOU&usp=drive_copy" },
            { level: "C2", tags: ["철학", "언어", "역사"], title: "<역사를 읽는 방법> - 1장 서론：그들의 방식으로 바라보기", link: "https://drive.google.com/open?id=1bWysDNo3szA9MIWAv0Ud-oPGGG3ovkop6YMa4pnTLLU&usp=drive_copy" }
        ];

        // --- Thumbnail Lookup ---
        const HTML_THUMBNAIL_MAP = {
            "https://docs.google.com/document/d/1EK_vwqYMgvhb7dB9zFlKQprhjN8ZmvqecJU-rgBudOY/edit?usp=sharing": { type: "image", url: "https://minumsa.minumsa.com/wp-content/uploads/bookcover/%ED%95%9C%EA%B5%AD%EC%9D%B4%EC%8B%AB%EC%96%B4%EC%84%9C_%ED%91%9C1-500x719.jpg" },
            "https://docs.google.com/document/d/1qVqh4boOn621kY1Es3yQtSwgVPOI3nr7SfIFA9mb8bY/edit?usp=sharing": { type: "image", url: "https://www.thenation.com/wp-content/uploads/2022/01/Johnson-Delbanco_img.jpg" },
            "https://docs.google.com/document/d/1ReWCwk4xRRqJBSwqsGKI6CPStYR5ABy5bEPuPjq6HPk/edit?usp=sharing": { type: "image", url: "https://contents.kyobobook.co.kr/sih/fit-in/458x0/pdt/9788936439743.jpg" },
            "https://docs.google.com/document/d/1ji7VWgB-8yvApxyYLt7H34MYg-lcX0iI6kAb5ZPXTS8/edit?usp=sharing": { type: "image", url: "https://contents.kyobobook.co.kr/sih/fit-in/458x0/pdt/9788936439743.jpg" },
            "c1-bookstore-pickup.html":                   { type: "image",   url: "https://www.heavenraven.com/wp-content/uploads/2024/05/TELEMMGLPICT000181622487_trans_NvBQzQNjv4BqGLLAPY3LddE1Qiv-bsIMYN_NrT6kNvN6YRSyUisEf90.jpg" },
            "b2-bookstore-pickup.html":                   { type: "youtube", id: "fwBGVX5NbsA" },
            "b2plus-bookstore-pickup.html":               { type: "youtube", id: "fwBGVX5NbsA" },
            "b2plus-art-and-design.html":                 { type: "youtube", id: "Q4O-bondzOk" },
            "b1plus-art-and-design.html":                 { type: "youtube", id: "Q4O-bondzOk" },
            "b2-when-someone-hates-me.html":              { type: "youtube", id: "HC6x8j5V4B4" },
            "b1plus-when-someone-hates-me.html":          { type: "youtube", id: "HC6x8j5V4B4" },
            "b2-instagram-vs-reality.html":               { type: "youtube", id: "fERBaXD9sI4" },
            "b1plus-instagram-vs-reality.html":           { type: "youtube", id: "fERBaXD9sI4" },
            "b1plus-my-salary-is-gone.html":              { type: "youtube", id: "l35ok1jy3_0" },
            "b2-my-salary-is-gone.html":                  { type: "youtube", id: "l35ok1jy3_0" },
            "b2-alfred-hitchcock.html":                   { type: "youtube", id: "CsJdnlpBPgE" },
            "b1plus-reels-addiction.html":                { type: "youtube", id: "nSqNLM5orPo" },
            "b2-reels-addiction.html":                    { type: "youtube", id: "nSqNLM5orPo" },
            "b2plus-why-koreans-like-chewy-texture.html": { type: "youtube", id: "Q3xPFQgDG4E" },
            "c1-dubai-cookie-science.html":               { type: "youtube", id: "htzfNwDM7II" },
            "c1-kospi-5000-meaning.html":                 { type: "youtube", id: "Ehz6n9RxMsc" },
            "b1plus-dubai-chewy-cookie.html":             { type: "youtube", id: "sVm4-Jd5bp4" },
            "b2plus-why-we-say-gata-yo.html":             { type: "youtube", id: "nb-L3S8AFh8" },
            "c1plus-korean-christmas-cake-origin.html":   { type: "youtube", id: "YoIbPhMETD8" },
            "b2plus-museum-admission.html":               { type: "youtube", id: "ljr7gKBXpKA" },
            "b2plus-cannabis-drink.html":                 { type: "youtube", id: "sEit34nId58" },
            "b2plus-fade-out-in-pop-songs.html":          { type: "image",   url: "https://raw.githubusercontent.com/openkoreanlearninglab/hub/refs/heads/main/Number%20of%20songs%20that%20fade%20out%20in%20the%20top%2010%20-%20by%20Vox%20%22Why%20more%20pop%20songs%20should%20end%20with%20a%20fade%20out%22.png" }
        };

        const getThumbnail = (link) => {
            if (!link) return null;
            if (link.includes("drive.google.com")) {
                const m = link.match(/[?&]id=([A-Za-z0-9_-]+)/);
                if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
            }
            if (HTML_THUMBNAIL_MAP[link]) {
                const m = HTML_THUMBNAIL_MAP[link];
                if (m.type === "youtube") return `https://img.youtube.com/vi/${m.id}/mqdefault.jpg`;
                if (m.type === "image")   return m.url;
            }
            return null;
        };

        const isYoutubeVideo = (link) => {
            if (!link) return false;
            if (link.endsWith('.html') && HTML_THUMBNAIL_MAP[link] && HTML_THUMBNAIL_MAP[link].type === 'youtube') {
                return true;
            }
            return false;
        };


        /* =========================================================
           OpenKoreanLab — 메인 목록 페이지 컨트롤러
           고성능 바닐라 JS · 단일 state 소스 · 부분 렌더 · 이벤트 위임
           (UI/클래스/기능은 기존과 100% 동일, 안전한 이스케이프 적용)
           ========================================================= */

        // --- 0. HTML 이스케이프 (제목·태그에 < > " & ' 가 있어도 안전) ---
        const esc = (v) => String(v == null ? '' : v).replace(/[&<>"']/g, (c) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));

        // --- 1. 단일 상태 소스 (Single Source of Truth) ---
        const state = {
            activeLevel: 'home',
            selectedTag: '전체',
            searchQuery: ''
        };

        // --- 2. DOM 참조 ---
        const els = {
            nav:        document.getElementById('nav-container'),
            hero:       document.getElementById('hero-container'),
            tags:       document.getElementById('tags-container'),
            cards:      document.getElementById('cards-container'),
            search:     document.getElementById('search-input'),
            searchClr:  document.getElementById('search-clear-btn'),
            logo:       document.getElementById('logo-home')
        };

        const NAV_ITEMS = [
            { id: 'home', label: '전체' },
            { id: 'B1+',  label: 'B1+' },
            { id: 'B2',   label: 'B2' },
            { id: 'B2+',  label: 'B2+' },
            { id: 'C1',   label: 'C1' },
            { id: 'C1+',  label: 'C1+' },
            { id: 'C2',   label: 'C2' }
        ];

        // --- 3. 파생 데이터 (state → 계산값) ---
        function computeTags() {
            const set = new Set(['전체', '최신']);
            MATERIALS_DATA.forEach((item) => {
                if (state.activeLevel !== 'home' && item.level !== state.activeLevel) return;
                if (item.tags) item.tags.forEach((t) => set.add(t));
            });
            return Array.from(set);
        }

        function computeFiltered() {
            let list = MATERIALS_DATA;
            if (state.activeLevel !== 'home') list = list.filter((i) => i.level === state.activeLevel);
            if (state.selectedTag === '최신') list = list.slice(0, 5);
            else if (state.selectedTag !== '전체') list = list.filter((i) => i.tags && i.tags.includes(state.selectedTag));
            if (state.searchQuery) {
                const q = state.searchQuery.toLowerCase();
                list = list.filter((i) =>
                    i.title.toLowerCase().includes(q) ||
                    (i.tags && i.tags.some((t) => t.toLowerCase().includes(q)))
                );
            }
            return list;
        }

        // --- 4. 뷰 템플릿 (순수 함수: state → HTML 문자열) ---
        function navHTML() {
            return NAV_ITEMS.map((item) => {
                const isActive = state.activeLevel === item.id;
                return `
                    <button type="button" data-level="${esc(item.id)}"
                        class="relative shrink-0 px-3 md:px-4 py-2 text-xs md:text-sm font-sans tracking-wide transition-colors duration-200 ${isActive ? 'text-black font-bold' : 'text-gray-400 hover:text-gray-700 font-medium'}">
                        ${esc(item.label)}
                        ${isActive ? '<span class="absolute left-3 right-3 -bottom-px h-px bg-black"></span>' : ''}
                    </button>`;
            }).join('');
        }

        function heroHTML() {
            const lvl = state.activeLevel === 'home' ? 'ALL' : state.activeLevel;
            const pageTitle    = LEVEL_TITLES[lvl]    || `Level ${state.activeLevel} 학습 자료`;
            const pageSubtitle = LEVEL_SUBTITLES[lvl] || `Learning Content for ${state.activeLevel}`;
            const levelInfo    = LEVEL_DEFINITIONS[lvl];
            const levelLabel   = lvl;
            return `
                <div class="flex items-center gap-3 mb-6">
                    <div class="flex items-center border border-gray-900 px-3 py-1 text-[10px] font-sans tracking-widest uppercase text-gray-900">
                        <span class="font-bold">${esc(levelLabel)}</span>
                        <span class="mx-2 w-px h-2.5 bg-gray-300"></span>
                        <span class="font-medium">${esc(levelInfo ? levelInfo.title : 'All Levels')}</span>
                    </div>
                </div>
                <h1 class="font-serif text-3xl md:text-5xl lg:text-6xl text-black font-bold leading-tight mb-3 tracking-tight">
                    ${esc(pageTitle)}
                </h1>
                <p class="font-serif text-gray-500 text-sm md:text-base italic">
                    ${esc(pageSubtitle)}
                </p>`;
        }

        function tagsHTML() {
            return computeTags().map((tag) => {
                const isActive = state.selectedTag === tag;
                return `
                    <button type="button" data-tag="${esc(tag)}"
                        class="px-3.5 py-1.5 text-xs font-sans font-bold tracking-widest uppercase rounded-sm transition-colors duration-200 ${isActive ? 'bg-gray-900 text-white border border-gray-900' : 'bg-white text-gray-500 border border-gray-200 hover:border-gray-900 hover:text-gray-900'}">
                        ${esc(tag)}
                    </button>`;
            }).join('');
        }

        function thumbBadgesHTML(item) {
            const tags = (item.tags || []).slice(0, 3)
                .map((t) => `<span class="bg-gray-900 text-white text-[9px] font-bold font-sans tracking-widest uppercase px-1.5 py-0.5">${esc(t)}</span>`)
                .join('');
            return `
                <div class="flex items-center justify-center flex-wrap gap-1 mb-3">
                    ${tags}
                    <span class="border border-gray-900 text-gray-900 text-[9px] font-bold font-sans tracking-widest uppercase px-1.5 py-0.5">${esc(item.level)}</span>
                </div>`;
        }

        function thumbnailHTML(item, eager) {
            const src = getThumbnail(item.link);
            const isVideo = isYoutubeVideo(item.link);
            if (src) {
                const playOverlay = isVideo ? `
                    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div class="w-9 h-9 md:w-10 md:h-10 bg-black/55 rounded-full flex items-center justify-center backdrop-blur-sm group-hover:bg-black/75 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-3.5 h-3.5 md:w-4 md:h-4 text-white ml-0.5">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </div>
                    </div>` : '';
                return `
                    <div class="w-1/3 sm:w-1/4 min-w-[120px] sm:min-w-[180px] md:min-w-[220px] relative overflow-hidden shrink-0 bg-gray-900">
                        <img src="${esc(src)}" alt="${esc(item.title)}" loading="${eager ? 'eager' : 'lazy'}" ${eager ? 'fetchpriority=\"high\" ' : ''}referrerPolicy="no-referrer"
                            class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 opacity-95 group-hover:opacity-100"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
                        <div class="hidden absolute inset-0 bg-white border-r border-gray-100 flex-col items-center justify-center text-center px-3 sm:px-4 py-5">
                            ${thumbBadgesHTML(item)}
                            <h4 class="font-serif text-[11px] sm:text-xs md:text-sm font-bold text-gray-900 leading-snug line-clamp-4 break-keep">${esc(item.title)}</h4>
                        </div>
                        ${playOverlay}
                    </div>`;
            }
            return `
                <div class="w-1/3 sm:w-1/4 min-w-[120px] sm:min-w-[180px] md:min-w-[220px] relative overflow-hidden shrink-0 bg-white border-r border-gray-100 flex flex-col items-center justify-center text-center px-3 sm:px-4 py-5">
                    ${thumbBadgesHTML(item)}
                    <h4 class="font-serif text-[11px] sm:text-xs md:text-sm font-bold text-gray-900 leading-snug line-clamp-4 break-keep">${esc(item.title)}</h4>
                    <div class="mt-3 w-6 h-px bg-gray-200"></div>
                </div>`;
        }

        function cardHTML(item, eager) {
            const isExternal = item.link && item.link.startsWith('http');
            const linkProps = isExternal ? 'target="_blank" rel="noreferrer"' : '';
            const tagButtons = (item.tags || []).map((tag) => {
                const isActive = state.selectedTag === tag;
                return `
                    <button type="button" data-card-tag="${esc(tag)}"
                        class="px-2 py-0.5 text-[10px] font-sans font-bold tracking-widest uppercase rounded-sm transition-colors ${isActive ? 'bg-gray-900 text-white border border-gray-900' : 'bg-gray-100 text-gray-600 border border-gray-100 hover:bg-gray-200'}">
                        ${esc(tag)}
                    </button>`;
            }).join('');
            return `
                <a href="${esc(item.link || '#')}" ${linkProps}
                    class="group relative flex items-stretch w-full bg-white border border-gray-200 hover:border-black transition-all duration-300 text-left overflow-hidden rounded-xl">
                    ${thumbnailHTML(item, eager)}
                    <div class="flex-1 p-5 md:p-6 flex flex-col justify-center min-w-0">
                        <div class="flex items-center flex-wrap gap-2 mb-3">
                            <span class="px-2 py-0.5 border border-gray-900 text-gray-900 text-[10px] font-sans font-bold tracking-widest uppercase rounded-sm">${esc(item.level)}</span>
                            ${tagButtons}
                        </div>
                        <h3 class="font-serif text-base md:text-lg lg:text-xl font-bold text-gray-900 leading-snug line-clamp-3 group-hover:text-black">
                            ${esc(item.title)}
                        </h3>
                        <div class="mt-3 hidden md:flex items-center gap-1.5 text-gray-400 group-hover:text-black text-xs font-sans transition-colors">
                            <span>자료 보기</span>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-3.5 h-3.5 transition-transform group-hover:translate-x-1">
                                <path d="M5 12h14" /><path d="m12 5 7 7-7 7" />
                            </svg>
                        </div>
                    </div>
                </a>`;
        }

        function cardsHTML() {
            const list = computeFiltered();
            if (list.length === 0) {
                return `
                    <div class="text-center py-16 text-gray-400 text-sm font-sans border border-dashed border-gray-200 rounded-xl">
                        해당 조건에 맞는 자료가 없습니다.
                    </div>`;
            }
            return list.map((item, i) => cardHTML(item, i === 0)).join('');
        }

        // --- 5. 렌더 (state → DOM). 필요한 부분만 부분 렌더 ---
        const view = {
            nav:   () => { els.nav.innerHTML   = navHTML(); },
            hero:  () => { els.hero.innerHTML  = heroHTML(); },
            tags:  () => { els.tags.innerHTML  = tagsHTML(); },
            cards: () => { els.cards.innerHTML = cardsHTML(); }
        };
        function render(parts) {
            (parts || ['nav', 'hero', 'tags', 'cards']).forEach((p) => view[p] && view[p]());
        }

        // --- 6. 액션 (state 변경 → 부분 렌더) ---
        function setLevel(level) {
            if (state.activeLevel === level && state.selectedTag === '전체' && !state.searchQuery) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                return;
            }
            state.activeLevel = level;
            state.selectedTag = '전체';
            state.searchQuery = '';
            els.search.value = '';
            els.searchClr.classList.add('hidden');
            render(['nav', 'hero', 'tags', 'cards']);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function setTag(tag) {
            if (state.selectedTag === tag) return;
            state.selectedTag = tag;
            render(['tags', 'cards']);
        }
        function setSearch(q) {
            state.searchQuery = q;
            els.searchClr.classList.toggle('hidden', !q);
            render(['cards']);
        }

        // --- 7. 이벤트 위임 (인라인 onclick / window 전역 없음) ---
        els.logo.addEventListener('click', (e) => { e.preventDefault(); setLevel('home'); });

        els.nav.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-level]');
            if (btn) setLevel(btn.dataset.level);
        });

        els.tags.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-tag]');
            if (btn) setTag(btn.dataset.tag);
        });

        // 카드 안의 태그 버튼은 링크 이동을 막고 태그 필터로 동작, 그 외 클릭은 링크 이동 허용
        els.cards.addEventListener('click', (e) => {
            const tagBtn = e.target.closest('[data-card-tag]');
            if (tagBtn) {
                e.preventDefault();
                e.stopPropagation();
                setTag(tagBtn.dataset.cardTag);
            }
        });

        els.search.addEventListener('input', (e) => setSearch(e.target.value));
        els.searchClr.addEventListener('click', () => {
            els.search.value = '';
            setSearch('');
            els.search.focus();
        });

        // --- 8. 초기 렌더 ---
        render(['nav', 'hero', 'tags', 'cards']);
    })();
    </script>
</body>
